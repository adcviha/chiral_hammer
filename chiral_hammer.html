<script>
// ===== state.js =====
// ===== CHIRAL HAMMER v0.10.0 — STATE & DATA MODEL =====
(function() {
const C = window.Chiral = window.Chiral || {};

// ===== STATE =====

C.state = {
  mode: '2d',              // '2d' | '3d'
  grid: new Map(),          // "x,z" -> { color, height }
  palette: [
    '#8b7355', '#6b8b6b', '#7b7b7b', '#8b6b4a',
    '#5a7a5a', '#9b8b7b', '#687868', '#a08060',
    '#4a6a5a', '#7b6b5b', '#8b8b7b', '#6b5b4b'
  ],
  activeColor: '#8b7355',

  // 3D camera state
  camPos: { x: 10, y: 10, z: 10 },
  camYaw: -Math.PI / 4,
  camPitch: -0.5,
  targetYaw: -Math.PI / 4,
  targetPitch: -0.5,

  // Mouse / input state
  mouse: { x: 0, y: 0 },
  mouseWorld2D: { x: 0, y: 0, z: 0 },
  mouseDown: false,
  mouseButton: -1,
  middleDown: false,
  rightDown: false,
  keys: {},

  // selection
  selecting: false,
  selectStart: { x: 0, y: 0 },
  selectEnd: { x: 0, y: 0 },
  selectScreenStart: { x: 0, y: 0 },
  selectScreenEnd: { x: 0, y: 0 },
  selectedCells: new Set(),
  selectedWalls: new Set(),

  // walls
  walls: new Map(),          // "gx,gz,N|E" -> { color, height }
  wallHeight: 1.0,
  wallColor: '#8b7355',

  // UI state
  tpOpen: false,
  tbOpen: false,
  tpMaximized: false,
  tbMaximized: false,
  cpOpen: false,
  wireframe: false,

  // active tool
  activeTool: 'tile',

  // save flag
  dirty: false,
  saveTimeout: null,

  // undo/redo
  undoStack: [],
  redoStack: [],
  maxUndoDepth: 100,

  // visual settings (control panel)
  settings: {
    ambientIntensity: 1.5,
    dirIntensity: 2.0,
    dirAzimuth: 45,
    dirAltitude: 60,
    dirColor: '#ffffff',
    fogEnabled: true,
    fogNear: 30,
    fogFar: 80,
    fogColor: '#4a6a7a',
    fov: 60,
    flySpeed: 5,
    lookSensitivity: 0.25,
    zoomSpeed: 0.05,
    gridSize: 200,
    gridOpacity: 1.0,
    gridColor: '#5a6a7a',
    pixelRatioCap: 2,
    clearColor: '#4a6a7a',
    defaultWallHeight: 1.0,
    defaultWallColor: '#8b7355',
  },
};

// ===== GRID MATH HELPERS =====

C.gridKey = function(gx, gz) {
  return `${gx},${gz}`;
};

C.cellExists = function(gx, gz) {
  return C.state.grid.has(C.gridKey(gx, gz));
};

C.getCell = function(gx, gz) {
  return C.state.grid.get(C.gridKey(gx, gz));
};

// ===== WALL MATH HELPERS =====

C.wallKey = function(gx, gz, dir) {
  return `${gx},${gz},${dir}`;
};

C.parseWallKey = function(key) {
  const parts = key.split(',');
  return { gx: Number(parts[0]), gz: Number(parts[1]), dir: parts[2] };
};

C.canonicalWallKey = function(gx, gz, dir) {
  if (dir === 'S') return C.wallKey(gx, gz, 'N');
  if (dir === 'W') return C.wallKey(gx - 1, gz, 'E');
  return C.wallKey(gx, gz, dir);
};

C.edgeHasAdjacentCell = function(gx, gz, dir) {
  if (dir === 'N') return C.cellExists(gx, gz) || C.cellExists(gx, gz - 1);
  if (dir === 'E') return C.cellExists(gx, gz) || C.cellExists(gx + 1, gz);
  return false;
};

// ===== CELL DATA MUTATIONS =====

C.setCell = function(gx, gz, color) {
  const key = C.gridKey(gx, gz);
  const old = C.state.grid.get(key);
  C.state.grid.set(key, { color, height: 0 });
  C.scene.addCellMesh(gx, gz, color);
  C.markDirty();
  C.pushUndo({
    type: 'setCell',
    gx, gz,
    oldColor: old ? old.color : null,
    newColor: color,
    undo: function() {
      if (this.oldColor) {
        C.state.grid.set(C.gridKey(this.gx, this.gz), { color: this.oldColor, height: 0 });
        C.scene.addCellMesh(this.gx, this.gz, this.oldColor);
      } else {
        C.removeCellSilent(this.gx, this.gz);
      }
      C.markDirty();
    },
    redo: function() {
      C.state.grid.set(C.gridKey(this.gx, this.gz), { color: this.newColor, height: 0 });
      C.scene.addCellMesh(this.gx, this.gz, this.newColor);
      C.markDirty();
    }
  });
};

C.setCellSilent = function(gx, gz, color) {
  const key = C.gridKey(gx, gz);
  C.state.grid.set(key, { color, height: 0 });
  C.scene.addCellMesh(gx, gz, color);
};

C.removeCell = function(gx, gz) {
  const key = C.gridKey(gx, gz);
  const old = C.state.grid.get(key);
  if (!old) return;
  C.state.grid.delete(key);
  C.scene.removeCellMesh(gx, gz);
  C.cleanOrphanWallsAround(gx, gz);
  C.markDirty();
  C.pushUndo({
    type: 'removeCell',
    gx, gz,
    oldColor: old.color,
    undo: function() {
      C.setCellSilent(this.gx, this.gz, this.oldColor);
      C.markDirty();
    },
    redo: function() {
      C.removeCellSilent(this.gx, this.gz);
      C.markDirty();
    }
  });
};

C.removeCellSilent = function(gx, gz) {
  const key = C.gridKey(gx, gz);
  C.state.grid.delete(key);
  C.scene.removeCellMesh(gx, gz);
  C.cleanOrphanWallsAround(gx, gz);
};

C.clearAllCells = function() {
  for (const key of C.state.grid.keys()) {
    const [gx, gz] = key.split(',').map(Number);
    C.scene.removeCellMesh(gx, gz);
  }
  C.state.grid.clear();
  for (const key of C.state.walls.keys()) {
    C.scene.removeWallMeshByKey(key);
  }
  C.state.walls.clear();
  C.state.undoStack = [];
  C.state.redoStack = [];
  C.markDirty();
  C.persistence.saveState();
  C.ui.updateStatusBar();
};

// ===== WALL DATA MUTATIONS =====

C.setWall = function(gx, gz, dir, color, height) {
  const key = C.canonicalWallKey(gx, gz, dir);
  const parsed = C.parseWallKey(key);
  const old = C.state.walls.get(key);
  C.state.walls.set(key, { color, height });
  C.scene.addWallMesh(parsed.gx, parsed.gz, parsed.dir, color, height);
  C.markDirty();
  C.pushUndo({
    type: 'setWall',
    gx: parsed.gx, gz: parsed.gz, dir: parsed.dir,
    oldColor: old ? old.color : null,
    oldHeight: old ? old.height : null,
    newColor: color, newHeight: height,
    undo: function() {
      if (this.oldColor) {
        C.setWallSilent(this.gx, this.gz, this.dir, this.oldColor, this.oldHeight);
      } else {
        C.removeWallSilent(this.gx, this.gz, this.dir);
      }
      C.markDirty();
    },
    redo: function() {
      C.setWallSilent(this.gx, this.gz, this.dir, this.newColor, this.newHeight);
      C.markDirty();
    }
  });
};

C.setWallSilent = function(gx, gz, dir, color, height) {
  const key = C.canonicalWallKey(gx, gz, dir);
  const parsed = C.parseWallKey(key);
  C.state.walls.set(key, { color, height });
  C.scene.addWallMesh(parsed.gx, parsed.gz, parsed.dir, color, height);
};

C.removeWall = function(gx, gz, dir) {
  const key = C.canonicalWallKey(gx, gz, dir);
  const old = C.state.walls.get(key);
  if (!old) return;
  C.state.walls.delete(key);
  C.scene.removeWallMeshByKey(key);
  C.markDirty();
  C.pushUndo({
    type: 'removeWall',
    gx, gz, dir,
    oldColor: old.color, oldHeight: old.height,
    undo: function() {
      C.setWallSilent(this.gx, this.gz, this.dir, this.oldColor, this.oldHeight);
      C.markDirty();
    },
    redo: function() {
      C.removeWallSilent(this.gx, this.gz, this.dir);
      C.markDirty();
    }
  });
};

C.removeWallSilent = function(gx, gz, dir) {
  const key = C.canonicalWallKey(gx, gz, dir);
  C.state.walls.delete(key);
  C.scene.removeWallMeshByKey(key);
};

C.toggleWall = function(gx, gz, dir) {
  const key = C.canonicalWallKey(gx, gz, dir);
  if (C.state.walls.has(key)) {
    C.removeWall(gx, gz, dir);
  } else {
    const parsed = C.parseWallKey(key);
    if (C.edgeHasAdjacentCell(parsed.gx, parsed.gz, parsed.dir)) {
      C.setWall(gx, gz, dir, C.state.wallColor, C.state.wallHeight);
    }
  }
};

C.cleanOrphanWallsAround = function(gx, gz) {
  const edges = [
    { cgx: gx,     cgz: gz,     cdir: 'N' },
    { cgx: gx,     cgz: gz + 1, cdir: 'N' },
    { cgx: gx,     cgz: gz,     cdir: 'E' },
    { cgx: gx - 1, cgz: gz,     cdir: 'E' },
  ];
  for (const { cgx, cgz, cdir } of edges) {
    const key = C.wallKey(cgx, cgz, cdir);
    if (C.state.walls.has(key) && !C.edgeHasAdjacentCell(cgx, cgz, cdir)) {
      C.scene.removeWallMeshByKey(key);
      C.state.walls.delete(key);
    }
  }
};

// ===== UNDO/REDO =====

C.pushUndo = function(cmd) {
  // Skip undo recording for silent operations (used during undo/redo playback)
  if (C._undoPlaying) return;
  C.state.undoStack.push(cmd);
  C.state.redoStack = [];
  if (C.state.undoStack.length > C.state.maxUndoDepth) {
    C.state.undoStack.shift();
  }
};

C.undo = function() {
  if (C.state.undoStack.length === 0) return;
  C._undoPlaying = true;
  const cmd = C.state.undoStack.pop();
  cmd.undo();
  C.state.redoStack.push(cmd);
  C._undoPlaying = false;
  C.ui.updateStatusBar();
};

C.redo = function() {
  if (C.state.redoStack.length === 0) return;
  C._undoPlaying = true;
  const cmd = C.state.redoStack.pop();
  cmd.redo();
  C.state.undoStack.push(cmd);
  C._undoPlaying = false;
  C.ui.updateStatusBar();
};

// ===== DIRTY TRACKING (called by mutations, defined here for dependency order) =====

C.markDirty = function() {
  C.state.dirty = true;
  C.ui.setSaveStatus('UNSAVED', '#ff0000');
};

})();

(function() {
const C = window.Chiral;
const s = C.state;

// ===== THREE.JS SETUP =====

C.addCellMesh = function(gx, gz, color) {

C.removeCellMesh = function(gx, gz) {

  const mesh = C.cellMeshes.get(key);
  if (mesh) {
    C.cellGroup.remove(mesh);
    mesh.material.dispose();
    C.cellMeshes.delete(key);
  }
};

C.updateCellColor = function(gx, gz, color) {
  const key = C.gridKey(gx, gz);
  const mesh = C.cellMeshes.get(key);
  if (mesh) mesh.material.color.set(color);
};

C.addWallMesh = function(gx, gz, dir, color, height) {
  const key = C.wallKey(gx, gz, dir);
  if (C.wallMeshes.has(key)) {
    C.wallGroup.remove(C.wallMeshes.get(key));
    C.wallMeshes.get(key).material.dispose();

  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.85, side: THREE.DoubleSide });
  if (s.wireframe) mat.wireframe = true;
  const mesh = new THREE.Mesh(C._wallGeo, mat);
  if (dir === 'N') {
    mesh.position.set(gx + 0.5, height / 2, gz);
    mesh.scale.set(1, height, 1);
  } else {
    mesh.position.set(gx + 1, height / 2, gz + 0.5);
    mesh.rotation.y = -Math.PI / 2;
    mesh.scale.set(1, height, 1);

  mesh.name = 'wall-' + key;
  C.wallGroup.add(mesh);

    C.wall2DGroup.remove(C.wall2DMeshes.get(key));

  indMesh.rotation.x = -Math.PI / 2;

    indMesh.position.set(gx + 1, 0.015, gz + 0.5);
    indMesh.rotation.z = -Math.PI / 2;

  C.wall2DGroup.add(indMesh);
  C.wall2DMeshes.set(key, indMesh);

  if (mesh) {
    C.wallGroup.remove(mesh);
    mesh.material.dispose();
    C.wallMeshes.delete(key);
  }
  const indMesh = C.wall2DMeshes.get(key);
  if (indMesh) {
    C.wall2DGroup.remove(indMesh);
    indMesh.material.dispose();
    C.wall2DMeshes.delete(key);

C.updateHighlight = function(event) {
  if (s.mode !== '2d') {
    C.highlightQuad.visible = false;
    C.edgeHighlight.visible = false;
    return;
  }
  const tool = C.effectiveTool();
  if (tool === 'wall') {
    C.highlightQuad.visible = false;
    C.updateEdgeHighlight(event);
    return;
  }
  C.edgeHighlight.visible = false;
  const grid = C.input.getGridFromMouse(event);
  if (!grid) {
    C.highlightQuad.visible = false;
    return;
  }
  C.highlightQuad.position.set(grid.gx + 0.5, 0.01, grid.gz + 0.5);
  C.highlightQuad.visible = true;
  const sb = document.getElementById('sb-cursor');
  if (sb) sb.textContent = `${grid.gx}, ${grid.gz}`;
  s.mouseWorld2D.x = grid.worldX;
  s.mouseWorld2D.y = 0;
  s.mouseWorld2D.z = grid.worldZ;
};

C.updateEdgeHighlight = function(event) {
  const edge = C.getNearestEdge(event);
  if (!edge) {
    C.edgeHighlight.visible = false;
    return;
  }
  const { gx, gz, dir } = edge;
  if (dir === 'N') {
    C.edgeHighlight.position.set(gx + 0.5, 0.015, gz);
    C.edgeHighlight.rotation.set(-Math.PI / 2, 0, 0);
  } else {
    C.edgeHighlight.position.set(gx + 1, 0.015, gz + 0.5);
    C.edgeHighlight.rotation.set(-Math.PI / 2, 0, -Math.PI / 2);
  }
  C.edgeHighlight.visible = true;
};

C.updateSelRect = function() {
  const x1 = Math.min(s.selectStart.x, s.selectEnd.x);
  const x2 = Math.max(s.selectStart.x, s.selectEnd.x);
  const z1 = Math.min(s.selectStart.y, s.selectEnd.y);
  const z2 = Math.max(s.selectStart.y, s.selectEnd.y);
  const w = Math.max(x2 - x1, 0.1);
  const h = Math.max(z2 - z1, 0.1);
  C.selRect.scale.set(w, h, 1);
  C.selRect.position.set((x1 + x2) / 2, 0.02, (z1 + z2) / 2);
  C.selOutline.scale.set(w, h, 1);
  C.selOutline.position.set((x1 + x2) / 2, 0.021, (z1 + z2) / 2);
};

C.showDragPreview = function(worldA, worldB) {
  C._selRectMat.color.set(0xff8800);
  C._selOutlineMat.color.set(0x885500);
  C.selRect.visible = true;
  C.selOutline.visible = true;
  s.selectStart.x = worldA.x;
  s.selectStart.y = worldA.z;
  s.selectEnd.x = worldB.x;
  s.selectEnd.y = worldB.z;
  C.updateSelRect();
};

C.hideDragPreview = function() {
  C.selRect.visible = false;
  C.selOutline.visible = false;
  C._selRectMat.color.set(0x00ffff);
  C._selOutlineMat.color.set(0x008888);
};

// ===== SCENE APPLY =====

C.applyLighting = function() {
  const st = s.settings;
  C.ambientLight.intensity = st.ambientIntensity;
  C.dirLight.intensity = st.dirIntensity;
  C.dirLight.color.set(st.dirColor);
  const az = THREE.MathUtils.degToRad(st.dirAzimuth);
  const alt = THREE.MathUtils.degToRad(st.dirAltitude);
  const dist = 22;
  C.dirLight.position.set(
    Math.sin(az) * Math.cos(alt) * dist,
    Math.sin(alt) * dist,
    Math.cos(az) * Math.cos(alt) * dist
  );
};

C.applyFog = function() {
  const st = s.settings;
  if (st.fogEnabled) {
    if (!C.scene3D.fog) {
      C.scene3D.fog = new THREE.Fog(st.fogColor, st.fogNear, st.fogFar);
    } else {
      C.scene3D.fog.color.set(st.fogColor);
      C.scene3D.fog.near = st.fogNear;
      C.scene3D.fog.far = st.fogFar;
    }
  } else {
    C.scene3D.fog = null;
  }
};

C.applyGrid = function() {
  const st = s.settings;
  C.gridHelper.material.color.set(st.gridColor);
  C.gridHelper.material.opacity = st.gridOpacity;
  C.gridHelper.material.transparent = true;
};

C.applyClearColor = function() {

C.applyAllSettings = function() {
  C.applyLighting();
  C.applyFog();
  C.applyGrid();

  C.renderer.setPixelRatio(Math.min(window.devicePixelRatio, s.settings.pixelRatioCap));
  if (s.mode === '3d') {
    C.camera3D.fov = s.settings.fov;
    C.camera3D.updateProjectionMatrix();
  }
};

// ===== WIREFRAME TOGGLE =====

C.toggleWireframe = function() {
  s.wireframe = !s.wireframe;
  for (const [key, mesh] of C.cellMeshes) {
    mesh.material.wireframe = s.wireframe;
    if (s.wireframe) {
      mesh.material.color.set('#222222');
    } else {
      const cell = s.grid.get(key);
      if (cell) mesh.material.color.set(cell.color);
    }
  }
  for (const mesh of C.wallMeshes.values()) {
    mesh.material.wireframe = s.wireframe;
  }
};

// ===== RENDER =====

C.clock = new THREE.Clock();

C.render = function() {

// ===== CHIRAL HAMMER v0.10.0 — CAMERA =====
(function() {
const C = window.Chiral;
const s = C.state;

// ===== 2D CAMERA =====

const FRUSTUM_SIZE = 20;

C.update2DCameraAspect = function() {
  const a = window.innerWidth / window.innerHeight;
  const fs = FRUSTUM_SIZE;
  C.camera2D.left = fs * a / -2;
  C.camera2D.right = fs * a / 2;
  C.camera2D.top = fs / 2;
  C.camera2D.bottom = fs / -2;
  C.camera2D.updateProjectionMatrix();
};

// ===== 2D PAN & ZOOM =====

C.pan2D = function(dx, dy) {
  if (s.mode !== '2d') return;
  const sc = FRUSTUM_SIZE / (C.camera2D.zoom * window.innerHeight);
  C.camera2D.position.x -= dx * sc;
  C.camera2D.position.z -= dy * sc;
};

C.zoom2D = function(delta, cursorX, cursorY) {
  if (s.mode !== '2d') return;
  const oldZoom = C.camera2D.zoom;
  const newZoom = Math.max(0.25, Math.min(8, oldZoom * (1 + delta * 0.001)));
  C.camera2D.zoom = newZoom;
  const ndcX = (cursorX / window.innerWidth) * 2 - 1;
  const ndcY = -(cursorY / window.innerHeight) * 2 + 1;
  const worldBefore = C._v3.set(ndcX / oldZoom, 0, ndcY / oldZoom)
    .add(C.camera2D.position);
  const worldAfter = C._v3.set(ndcX / newZoom, 0, ndcY / newZoom)
    .add(C.camera2D.position);
  C.camera2D.position.add(worldBefore.sub(worldAfter));
  C.camera2D.updateProjectionMatrix();
};

// ===== 3D CAMERA =====

C.update3DCamera = function(deltaSec) {
  if (s.mode !== '3d') return;

  const st = s.settings;
  const speed = s.keys['ShiftLeft'] || s.keys['ShiftRight'] ? st.flySpeed * 3 : st.flySpeed;
  const moveSpeed = speed * deltaSec;
  const lookSensitivity = st.lookSensitivity;

  // Accumulate mouse delta while RMB held
  if (s.rightDown) {
    s.targetYaw -= s.mouse.x * lookSensitivity * deltaSec;
    s.targetPitch -= s.mouse.y * lookSensitivity * deltaSec;
    s.targetPitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, s.targetPitch));
    s.mouse.x = 0;
    s.mouse.y = 0;
  }

  // Smooth lerp
  const lerpRate = 5;
  const t = 1 - Math.exp(-lerpRate * deltaSec);
  s.camYaw += (s.targetYaw - s.camYaw) * t;
  s.camPitch += (s.targetPitch - s.camPitch) * t;

  const forward = new THREE.Vector3(
    Math.sin(s.camYaw) * Math.cos(s.camPitch),
    Math.sin(s.camPitch),
    Math.cos(s.camYaw) * Math.cos(s.camPitch)
  ).normalize();

  const right = new THREE.Vector3(
    Math.sin(s.camYaw + Math.PI / 2),
    0,
    Math.cos(s.camYaw + Math.PI / 2)
  ).normalize();

  if (s.keys['KeyW']) s.camPos.x += forward.x * moveSpeed;
  if (s.keys['KeyW']) s.camPos.y += forward.y * moveSpeed;
  if (s.keys['KeyW']) s.camPos.z += forward.z * moveSpeed;
  if (s.keys['KeyS']) s.camPos.x -= forward.x * moveSpeed;
  if (s.keys['KeyS']) s.camPos.y -= forward.y * moveSpeed;
  if (s.keys['KeyS']) s.camPos.z -= forward.z * moveSpeed;
  if (s.keys['KeyA']) s.camPos.x += right.x * moveSpeed;
  if (s.keys['KeyA']) s.camPos.z += right.z * moveSpeed;
  if (s.keys['KeyD']) s.camPos.x -= right.x * moveSpeed;
  if (s.keys['KeyD']) s.camPos.z -= right.z * moveSpeed;
  if (s.keys['KeyQ']) s.camPos.y -= moveSpeed;
  if (s.keys['KeyE']) s.camPos.y += moveSpeed;

  // Arrow keys look
  const arrowLook = 2 * deltaSec;
  if (s.keys['ArrowLeft'])  s.targetYaw += arrowLook;
  if (s.keys['ArrowRight']) s.targetYaw -= arrowLook;
  if (s.keys['ArrowUp'])    s.targetPitch += arrowLook;
  if (s.keys['ArrowDown'])  s.targetPitch -= arrowLook;
  s.targetPitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, s.targetPitch));

  const lookTarget = new THREE.Vector3(
    s.camPos.x + Math.sin(s.camYaw) * Math.cos(s.camPitch),
    s.camPos.y + Math.sin(s.camPitch),
    s.camPos.z + Math.cos(s.camYaw) * Math.cos(s.camPitch)
  );

  C.camera3D.position.set(s.camPos.x, s.camPos.y, s.camPos.z);
  C.camera3D.lookAt(lookTarget);

  const sb = document.getElementById('sb-cursor');
  if (sb) sb.textContent =
    `${s.camPos.x.toFixed(1)}, ${s.camPos.y.toFixed(1)}, ${s.camPos.z.toFixed(1)}`;
};

// ===== MODE SWITCHING =====

C.getCellBounds = function() {
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  if (C.cellMeshes.size === 0) return null;
  for (const mesh of C.cellMeshes.values()) {
    const p = mesh.position;
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.z < minZ) minZ = p.z;
    if (p.z > maxZ) maxZ = p.z;
  }
  return { cx: (minX + maxX) / 2, cz: (minZ + maxZ) / 2, span: Math.max(maxX - minX, maxZ - minZ, 2) };
};

C.setMode = function(mode) {
  s.mode = mode;
  C.activeCamera = mode === '2d' ? C.camera2D : C.camera3D;

  if (mode === '2d') {
    C.highlightQuad.visible = true;
    C.wall2DGroup.visible = true;
    const sb = document.getElementById('sb-cursor');
    if (sb) sb.textContent = '—';
  } else {
    C.highlightQuad.visible = false;
    C.wall2DGroup.visible = false;

    const bounds = C.getCellBounds();
    if (bounds) {
      const dist = Math.max(bounds.span * 1.2, 6);
      const h = dist * 0.6;
      s.camPos.x = bounds.cx + dist;
      s.camPos.y = h;
      s.camPos.z = bounds.cz + dist;
      const dir = new THREE.Vector3(bounds.cx, 0, bounds.cz)
        .sub(new THREE.Vector3(s.camPos.x, 0, s.camPos.z)).normalize();
      s.camYaw = Math.atan2(dir.x, dir.z);
      s.camPitch = -0.3;
      s.targetYaw = s.camYaw;
      s.targetPitch = s.camPitch;
    }
    C.camera3D.position.set(s.camPos.x, s.camPos.y, s.camPos.z);
  }

  C.ui.updateHelp();
  C.ui.updateStatusBar();

  C.renderer.setSize(window.innerWidth, window.innerHeight);
  if (mode === '2d') {
    C.update2DCameraAspect();
  } else {
    C.camera3D.aspect = window.innerWidth / window.innerHeight;
    C.camera3D.fov = s.settings.fov;
    C.camera3D.updateProjectionMatrix();
  }
};

// ===== 3D ZOOM (scroll) =====

C.zoom3D = function(deltaY, clientX, clientY) {
  C._ndc.x = (clientX / window.innerWidth) * 2 - 1;
  C._ndc.y = -(clientY / window.innerHeight) * 2 + 1;
  C._raycaster.setFromCamera(C._ndc, C.camera3D);
  const hit = new THREE.Vector3();
  const didHit = C._raycaster.ray.intersectPlane(C._plane, hit);
  const dolly = -deltaY * s.settings.zoomSpeed;
  if (didHit) {
    const dir = new THREE.Vector3().subVectors(hit,
      new THREE.Vector3(s.camPos.x, s.camPos.y, s.camPos.z)).normalize();
    s.camPos.x += dir.x * dolly;
    s.camPos.y += dir.y * dolly;
    s.camPos.z += dir.z * dolly;
  } else {
    const fwd = new THREE.Vector3(
      Math.sin(s.camYaw) * Math.cos(s.camPitch),
      Math.sin(s.camPitch),
      Math.cos(s.camYaw) * Math.cos(s.camPitch)
    ).normalize();
    s.camPos.x += fwd.x * dolly;
    s.camPos.y += fwd.y * dolly;
    s.camPos.z += fwd.z * dolly;
  }
};

})();

(function() {

C.input.getWorldFromMouse = function(event) {

  C._raycaster.setFromCamera(C._ndc, C.activeCamera);
  const target = new THREE.Vector3();
  const denom = C._raycaster.ray.direction.y;
  if (Math.abs(denom) < 0.0001) return null;
  const t = -C._raycaster.ray.origin.y / denom;
  if (t < 0) return null;
  target.copy(C._raycaster.ray.origin).addScaledVector(C._raycaster.ray.direction, t);
  return target;
};

C.input.getGridFromMouse = function(event) {
  C._ndc.x = (event.clientX / window.innerWidth) * 2 - 1;
  C._ndc.y = -(event.clientY / window.innerHeight) * 2 + 1;
  C._raycaster.setFromCamera(C._ndc, C.activeCamera);

  const target = new THREE.Vector3();
  const rayOrigin = C._raycaster.ray.origin;
  const rayDir = C._raycaster.ray.direction;
  const denom = rayDir.y;
  if (Math.abs(denom) < 0.0001) return null;
  const t = -rayOrigin.y / denom;
  if (t < 0) return null;
  target.copy(rayOrigin).addScaledVector(rayDir, t);

  const gx = Math.floor(target.x);
  const gz = Math.floor(target.z);
  return { gx, gz, worldX: target.x, worldZ: target.z };
};

// ===== NEAREST EDGE (wall tool) =====

C.getNearestEdge = function(event) {
  const grid = C.input.getGridFromMouse(event);
  if (!grid) return null;
  const { gx, gz, worldX, worldZ } = grid;
  const fx = worldX - gx;
  const fz = worldZ - gz;
  const distN = fz;
  const distS = 1 - fz;
  const distW = fx;
  const distE = 1 - fx;
  const threshold = 0.15;
  const minDist = Math.min(distN, distS, distW, distE);
  if (minDist > threshold) return null;
  let cgx, cgz, cdir;
  if (minDist === distN)      { cgx = gx;     cgz = gz;     cdir = 'N'; }
  else if (minDist === distS) { cgx = gx;     cgz = gz + 1; cdir = 'N'; }
  else if (minDist === distW) { cgx = gx - 1; cgz = gz;     cdir = 'E'; }
  else                        { cgx = gx;     cgz = gz;     cdir = 'E'; }
  return { gx: cgx, gz: cgz, dir: cdir, key: C.wallKey(cgx, cgz, cdir) };
};

// ===== EFFECTIVE TOOL =====

C.effectiveTool = function() {
  if (s.keys['ShiftLeft'] || s.keys['ShiftRight']) return 'select';
  return s.activeTool;
};

// ===== KEY HANDLERS =====

C.input.onKeyDown = function(event) {
  s.keys[event.code] = true;

  if (event.code === 'Tab') {
    event.preventDefault();
    C.setMode(s.mode === '2d' ? '3d' : '2d');
    return;
  }
  if (event.code === 'KeyT') { C.ui.toggleTexturePanel(); return; }
  if (event.code === 'KeyG') { C.toggleWireframe(); return; }
  if (event.code === 'KeyH') { C.ui.toggleFog(); return; }
  if (event.code === 'KeyV') { C.ui.toggleControlPanel(); return; }

  if (event.code === 'Backspace' || event.code === 'Delete') {
    event.preventDefault();
    C.deleteSelectedCells();
    return;
  }
  if (event.code === 'KeyB') { C.ui.toggleTreasureBox(); return; }

  if (event.code === 'Escape') {
    if (s.tpOpen) { C.ui.toggleTexturePanel(); return; }
    if (s.tbOpen) { C.ui.toggleTreasureBox(); return; }
    if (s.cpOpen) { C.ui.toggleControlPanel(); return; }
  }

  // Undo/Redo
  if (event.code === 'KeyZ' && (event.ctrlKey || event.metaKey)) {
    event.preventDefault();
    if (event.shiftKey) C.redo();
    else C.undo();
    return;
  }

  // Tool shortcuts
  if (event.code === 'Digit1') { C.setActiveTool('tile'); return; }
  if (event.code === 'Digit2') { C.setActiveTool('fill'); return; }
  if (event.code === 'Digit3') { C.setActiveTool('wall'); return; }
  if (event.code === 'Digit4') { C.setActiveTool('select'); return; }
  if (event.code === 'Digit5') { C.setActiveTool('house'); return; }

  // Shift for temp-select
  if (event.code === 'ShiftLeft' || event.code === 'ShiftRight') {
    C.ui.updateHelp();
    C.ui.updateStatusBar();
  }
};

C.input.onKeyUp = function(event) {
  s.keys[event.code] = false;
  if (event.code === 'ShiftLeft' || event.code === 'ShiftRight') {
    C.ui.updateHelp();
    C.ui.updateStatusBar();
  }
};

// ===== TOOL ACTIVE SETTER =====

C.setActiveTool = function(tool) {
  s.activeTool = tool;
  const buttons = document.querySelectorAll('#tool-palette .tpl-btn');
  buttons.forEach(function(btn) {
    if (btn.classList) {
      btn.classList.toggle('active', btn.dataset.tool === tool);
    }
  });
  C.ui.updateHelp();
  C.ui.updateStatusBar();
};

})();

// ===== tools/fill.js =====
// ===== CHIRAL HAMMER v0.10.0 — TOOL: FILL =====
// Drag-rect fill. Atomic on mouseup. LMB fill, RMB erase.
(function() {
const C = window.Chiral;
const s = C.state;

C.tools = C.tools || {};

C.tools.fill = {
  onDown: function(event) {
    if (event.button === 0) {
      s._dragStart = C.input.getWorldFromMouse(event);
      // Also place the starting cell immediately
      if (s._dragStart) {
        const gx = Math.floor(s._dragStart.x);
        const gz = Math.floor(s._dragStart.z);
        const existing = C.getCell(gx, gz);
        if (!existing || existing.color !== s.activeColor) {
          C.setCell(gx, gz, s.activeColor);
          C.ui.updateStatusBar();
        }
      }
    } else if (event.button === 2) {
      s._dragStart = C.input.getWorldFromMouse(event);
      if (s.mode === '2d') {
        const grid = C.input.getGridFromMouse(event);
        if (grid && C.cellExists(grid.gx, grid.gz)) {
          C.removeCell(grid.gx, grid.gz);
          C.ui.updateStatusBar();
        }
      }
    }
  },

  onMove: function(event) {
    if (s.mode === '2d') {
      C.updateHighlight(event);
    } else {
      C.edgeHighlight.visible = false;
    }
    if (s.mouseDown && s.mouseButton === 0 && (event.buttons & 1) && s._dragStart) {
      const world = C.input.getWorldFromMouse(event);
      if (world) {
        C.showDragPreview(s._dragStart, world);
      }
    }
    if (s.mouseDown && s.mouseButton === 2 && (event.buttons & 2) && s._dragStart) {
      const world = C.input.getWorldFromMouse(event);
      if (world) {
        C.showDragPreview(s._dragStart, world);
      }
    }
  },

  onUp: function(event) {
    C.hideDragPreview();
    if (s._dragStart) {
      const world = C.input.getWorldFromMouse(event);
      if (world) {
        if (s.mouseButton === 0) {
          C.fillRect(s._dragStart, world);
        } else if (s.mouseButton === 2) {
          C.eraseRect(s._dragStart, world);
        }
      }
    }
  }
};

// ===== FILL RECT =====

C.fillRect = function(worldA, worldB) {
  const x1 = Math.min(worldA.x, worldB.x);
  const x2 = Math.max(worldA.x, worldB.x);
  const z1 = Math.min(worldA.z, worldB.z);
  const z2 = Math.max(worldA.z, worldB.z);
  const gx1 = Math.floor(x1);
  const gx2 = Math.floor(x2 - 0.001);
  const gz1 = Math.floor(z1);
  const gz2 = Math.floor(z2 - 0.001);
  // Defer undo — push one compound undo for the whole rect
  const oldCells = [];
  for (let gx = gx1; gx <= gx2; gx++) {
    for (let gz = gz1; gz <= gz2; gz++) {
      const existing = C.getCell(gx, gz);
      oldCells.push({ gx, gz, oldColor: existing ? existing.color : null });
      if (!existing || existing.color !== s.activeColor) {
        C.setCellSilent(gx, gz, s.activeColor);
      }
    }
  }
  C.markDirty();
  C.pushUndo({
    type: 'fillRect',
    oldCells: oldCells,
    newColor: s.activeColor,
    undo: function() {
      C._undoPlaying = true;
      for (const oc of this.oldCells) {
        if (oc.oldColor) {
          C.setCellSilent(oc.gx, oc.gz, oc.oldColor);
        } else {
          C.removeCellSilent(oc.gx, oc.gz);
        }
      }
      C._undoPlaying = false;
      C.markDirty();
    },
    redo: function() {
      C._undoPlaying = true;
      for (const oc of this.oldCells) {
        C.setCellSilent(oc.gx, oc.gz, this.newColor);
      }
      C._undoPlaying = false;
      C.markDirty();
    }
  });
  C.ui.updateStatusBar();
};

C.eraseRect = function(worldA, worldB) {
  const x1 = Math.min(worldA.x, worldB.x);
  const x2 = Math.max(worldA.x, worldB.x);
  const z1 = Math.min(worldA.z, worldB.z);
  const z2 = Math.max(worldA.z, worldB.z);
  const gx1 = Math.floor(x1);
  const gx2 = Math.floor(x2 - 0.001);
  const gz1 = Math.floor(z1);
  const gz2 = Math.floor(z2 - 0.001);
  const oldCells = [];
  for (let gx = gx1; gx <= gx2; gx++) {
    for (let gz = gz1; gz <= gz2; gz++) {
      if (C.cellExists(gx, gz)) {
        oldCells.push({ gx, gz, oldColor: C.getCell(gx, gz).color });
        C.removeCellSilent(gx, gz);
      }
    }
  }
  if (oldCells.length === 0) return;
  C.markDirty();
  C.pushUndo({
    type: 'eraseRect',
    oldCells: oldCells,
    undo: function() {
      C._undoPlaying = true;
      for (const oc of this.oldCells) {
        C.setCellSilent(oc.gx, oc.gz, oc.oldColor);
      }
      C._undoPlaying = false;
      C.markDirty();
    },
    redo: function() {
      C._undoPlaying = true;
      for (const oc of this.oldCells) {
        C.removeCellSilent(oc.gx, oc.gz);
      }
      C._undoPlaying = false;
      C.markDirty();
    }
  });
  C.ui.updateStatusBar();
};

})();

// ===== tools/wall.js =====
// ===== CHIRAL HAMMER v0.10.0 — TOOL: WALL =====
// Click edge to toggle. Drag to pen a line along the locked grid direction.
(function() {
const C = window.Chiral;
const s = C.state;

C.tools = C.tools || {};

C.tools.wall = {
  onDown: function(event) {
    if (event.button === 0) {
      s._dragStart = C.input.getWorldFromMouse(event);
      s._dragWallKeys = new Set();
      const edge = C.getNearestEdge(event);
      if (edge) {
        s._dragEdgeDir = edge.dir;
        s._dragEdgeGX = edge.gx;
        s._dragEdgeGZ = edge.gz;
      }
    } else if (event.button === 2) {
      // RMB — delete wall on nearest edge
      s._dragStart = C.input.getWorldFromMouse(event);
      const edge = C.getNearestEdge(event);
      if (edge) {
        s._dragEdgeDir = edge.dir;
        s._dragEdgeGX = edge.gx;
        s._dragEdgeGZ = edge.gz;
        const key = C.canonicalWallKey(edge.gx, edge.gz, edge.dir);
        if (s.walls.has(key)) {
          C.removeWall(edge.gx, edge.gz, edge.dir);
          C.ui.updateStatusBar();
        }
      }
    }
  },

  onMove: function(event) {
    if (s.mode === '2d') C.updateHighlight(event);
    else C.updateEdgeHighlight(event);

    // LMB drag — real-time wall placement along locked direction
    if (s.mouseDown && s.mouseButton === 0 && (event.buttons & 1) && s._dragStart && s._dragEdgeDir) {
      const world = C.input.getWorldFromMouse(event);
      if (world) {
        // Clear previous drag walls
        for (const key of s._dragWallKeys) {
          C.scene.removeWallMeshByKey(key);
          s.walls.delete(key);
        }
        s._dragWallKeys.clear();
        const walls = C.computePenWalls(s._dragEdgeGX, s._dragEdgeGZ, s._dragEdgeDir, world);
        for (const w of walls) {
          C.setWallSilent(w.gx, w.gz, w.dir, s.wallColor, s.wallHeight);
          s._dragWallKeys.add(C.canonicalWallKey(w.gx, w.gz, w.dir));
        }
        C.ui.updateStatusBar();
      }
    }

    // RMB drag — real-time wall deletion
    if (s.mouseDown && s.mouseButton === 2 && (event.buttons & 2) && s._dragStart && s._dragEdgeDir) {
      const world = C.input.getWorldFromMouse(event);
      if (world) {
        const walls = C.computePenWalls(s._dragEdgeGX, s._dragEdgeGZ, s._dragEdgeDir, world);
        for (const w of walls) {
          const key = C.canonicalWallKey(w.gx, w.gz, w.dir);
          if (s.walls.has(key)) C.removeWall(w.gx, w.gz, w.dir);
        }
        C.ui.updateStatusBar();
      }
    }
  },

  onUp: function(event) {
    // Small click (no significant drag) = toggle single edge
    if (s._dragStart && s.mouseButton === 0) {
      const world = C.input.getWorldFromMouse(event);
      if (world) {
        const dx = world.x - s._dragStart.x;
        const dz = world.z - s._dragStart.z;
        if (Math.abs(dx) < 0.3 && Math.abs(dz) < 0.3) {
          const edge = C.getNearestEdge(event);
          if (edge) {
            C.setWall(edge.gx, edge.gz, edge.dir, s.wallColor, s.wallHeight);
            C.ui.updateStatusBar();
          }
        }
      }
    }
    s._dragWallKeys = null;
    s._dragEdgeDir = null;
    s._dragEdgeGX = null;
    s._dragEdgeGZ = null;
  }
};

// ===== PEN WALL COMPUTATION =====

C.computePenWalls = function(startGX, startGZ, dir, worldEnd) {
  const walls = [];
  if (dir === 'N') {
    const gxEnd = Math.floor(worldEnd.x);
    const gxMin = Math.min(startGX, gxEnd);
    const gxMax = Math.max(startGX, gxEnd);
    for (let gx = gxMin; gx < gxMax; gx++) {
      walls.push({ gx, gz: startGZ, dir: 'N' });
    }
  } else {
    const gzEnd = Math.floor(worldEnd.z);
    const gzMin = Math.min(startGZ, gzEnd);
    const gzMax = Math.max(startGZ, gzEnd);
    for (let gz = gzMin; gz < gzMax; gz++) {
      walls.push({ gx: startGX, gz, dir: 'E' });
    }
  }
  return walls;
};

// ===== ORTHOGONAL WALL PATH =====

C.computeOrthogonalWalls = function(worldA, worldB) {
  const walls = [];
  const gx1 = Math.floor(worldA.x);
  const gz1 = Math.floor(worldA.z);
  const gx2 = Math.floor(worldB.x);
  const gz2 = Math.floor(worldB.z);

  if (gx2 !== gx1) {
    const gxMin = Math.min(gx1, gx2);
    const gxMax = Math.max(gx1, gx2);
    for (let gx = gxMin; gx < gxMax; gx++) {
      walls.push({ gx, gz: gz1, dir: 'N' });
    }
  }
  if (gz2 !== gz1) {
    const gzMin = Math.min(gz1, gz2);
    const gzMax = Math.max(gz1, gz2);
    for (let gz = gzMin; gz < gzMax; gz++) {
      walls.push({ gx: gx2 - 1, gz, dir: 'E' });
    }
  }
  return walls;
};

})();

      if (s.mode === '2d') {
        s._dragStart = C.input.getWorldFromMouse(event);
        const grid = C.input.getGridFromMouse(event);
        if (grid && C.cellExists(grid.gx, grid.gz)) {
          C.removeCell(grid.gx, grid.gz);
          C.ui.updateStatusBar();
        } else {
          const edge = C.getNearestEdge(event);
          if (edge) {
            const key = C.canonicalWallKey(edge.gx, edge.gz, edge.dir);
            if (s.walls.has(key)) {
              C.removeWall(edge.gx, edge.gz, edge.dir);
              C.ui.updateStatusBar();
            }
          }
        }
      } else {
        C.deleteAtMouse3D(event);
      }
    }
  },

  onMove: function(event) {
    if (s.mode === '2d') {
      C.updateHighlight(event);
      if (s.selecting) {
        const world = C.input.getWorldFromMouse(event);
        if (world) {
          s.selectEnd.x = world.x;
          s.selectEnd.y = world.z;
          C.updateSelRect();
        }
        return;
      }
    } else {
      C.edgeHighlight.visible = false;
      if (s.selecting) {
        s.selectScreenEnd.x = event.clientX;
        s.selectScreenEnd.y = event.clientY;
        const x1 = Math.min(s.selectScreenStart.x, s.selectScreenEnd.x);
        const y1 = Math.min(s.selectScreenStart.y, s.selectScreenEnd.y);
        const x2 = Math.max(s.selectScreenStart.x, s.selectScreenEnd.x);
        const y2 = Math.max(s.selectScreenStart.y, s.selectScreenEnd.y);
        const sb = document.getElementById('sel-box');
        if (sb) {
          sb.style.left = x1 + 'px';
          sb.style.top = y1 + 'px';
          sb.style.width = (x2 - x1) + 'px';
          sb.style.height = (y2 - y1) + 'px';
        }
      }

    // RMB drag erase (2D only)
    if (s.mode === '2d' && s.mouseDown && s.mouseButton === 2 && (event.buttons & 2) && s._dragStart) {
      const world = C.input.getWorldFromMouse(event);
      if (world) C.eraseRect(s._dragStart, world);
    }
  },

  onUp: function(event) {
    if (s.selecting) {
      if (s.mode === '3d') {
        const dx = Math.abs(s.selectScreenEnd.x - s.selectScreenStart.x);
        const dy = Math.abs(s.selectScreenEnd.y - s.selectScreenStart.y);
        if (dx < 3 && dy < 3) {
          C.toggleSelectAtMouse3D(event);
        } else {
          C.commitSelection3D();
        }
        const sb = document.getElementById('sel-box');
        if (sb) sb.style.display = 'none';
      } else {
        const dx = Math.abs(s.selectEnd.x - s.selectStart.x);
        const dy = Math.abs(s.selectEnd.y - s.selectStart.y);
        if (dx < 0.2 && dy < 0.2) {
          C.toggleSelectAtMouse2D(event);
        } else {
          C.commitSelection();
        }
        C.selRect.visible = false;
        C.selOutline.visible = false;
      }
      s.selecting = false;
    }
  }
};

// ===== SELECTION COMMIT =====

C.commitSelection = function() {
  const x1 = Math.min(s.selectStart.x, s.selectEnd.x);
  const x2 = Math.max(s.selectStart.x, s.selectEnd.x);
  const z1 = Math.min(s.selectStart.y, s.selectEnd.y);
  const z2 = Math.max(s.selectStart.y, s.selectEnd.y);

  for (const key of s.selectedCells) C.updateCellSelectionVisual(key, false);
  s.selectedCells.clear();

  const gx1 = Math.floor(x1);
  const gx2 = Math.floor(x2 - 0.001);
  const gz1 = Math.floor(z1);
  const gz2 = Math.floor(z2 - 0.001);
  for (let gx = gx1; gx <= gx2; gx++) {
    for (let gz = gz1; gz <= gz2; gz++) {
      const key = C.gridKey(gx, gz);
      if (s.grid.has(key)) {
        s.selectedCells.add(key);
        C.updateCellSelectionVisual(key, true);
      }
    }
  }

  for (const [key, wall] of s.walls) {
    const { gx, gz, dir } = C.parseWallKey(key);
    const mx = dir === 'N' ? gx + 0.5 : gx + 1;
    const mz = dir === 'N' ? gz : gz + 0.5;
    if (mx >= x1 && mx <= x2 && mz >= z1 && mz <= z2) {
      s.selectedWalls.add(key);
      C.updateWallSelectionVisual(key, true);
    }
  }
};

C.commitSelection3D = function() {
  const x1 = Math.min(s.selectScreenStart.x, s.selectScreenEnd.x);
  const y1 = Math.min(s.selectScreenStart.y, s.selectScreenEnd.y);
  const x2 = Math.max(s.selectScreenStart.x, s.selectScreenEnd.x);
  const y2 = Math.max(s.selectScreenStart.y, s.selectScreenEnd.y);
  if (x2 - x1 < 3 && y2 - y1 < 3) return;

  for (const key of s.selectedCells) C.updateCellSelectionVisual(key, false);
  s.selectedCells.clear();

  for (const [key, mesh] of C.cellMeshes) {
    const wp = mesh.position.clone().project(C.camera3D);
    if (wp.z > 1) continue;
    const sx = (wp.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-wp.y * 0.5 + 0.5) * window.innerHeight;
    if (sx >= x1 && sx <= x2 && sy >= y1 && sy <= y2) {
      s.selectedCells.add(key);
      C.updateCellSelectionVisual(key, true);
    }
  }

  for (const [key, mesh] of C.wallMeshes) {
    const wp = mesh.position.clone().project(C.camera3D);
    if (wp.z > 1) continue;
    const sx = (wp.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-wp.y * 0.5 + 0.5) * window.innerHeight;
    if (sx >= x1 && sx <= x2 && sy >= y1 && sy <= y2) {
      s.selectedWalls.add(key);
      C.updateWallSelectionVisual(key, true);
    }
  }
};

C.clearSelection = function() {
  for (const key of s.selectedCells) C.updateCellSelectionVisual(key, false);
  s.selectedCells.clear();
  for (const key of s.selectedWalls) C.updateWallSelectionVisual(key, false);
  s.selectedWalls.clear();
};

C.toggleSelectAtMouse2D = function(event) {
  const grid = C.input.getGridFromMouse(event);
  if (grid && C.cellExists(grid.gx, grid.gz)) {
    const key = C.gridKey(grid.gx, grid.gz);
    if (s.selectedCells.has(key)) {
      s.selectedCells.delete(key);
      C.updateCellSelectionVisual(key, false);
    } else {
      s.selectedCells.add(key);
      C.updateCellSelectionVisual(key, true);
    }
    return;
  }
  const edge = C.getNearestEdge(event);
  if (edge) {
    const key = C.canonicalWallKey(edge.gx, edge.gz, edge.dir);
    if (s.walls.has(key)) {
      if (s.selectedWalls.has(key)) {
        s.selectedWalls.delete(key);
        C.updateWallSelectionVisual(key, false);
      } else {
        s.selectedWalls.add(key);
        C.updateWallSelectionVisual(key, true);
      }
      return;
    }
  }
  C.clearSelection();
};

C.toggleSelectAtMouse3D = function(event) {
  C._ndc.x = (event.clientX / window.innerWidth) * 2 - 1;
  C._ndc.y = -(event.clientY / window.innerHeight) * 2 + 1;
  C._raycaster.setFromCamera(C._ndc, C.camera3D);

  const cellHits = C._raycaster.intersectObjects(Array.from(C.cellMeshes.values()));
  if (cellHits.length > 0) {
    const key = cellHits[0].object.name.replace('cell-', '');
    if (s.grid.has(key)) {
      if (s.selectedCells.has(key)) {
        s.selectedCells.delete(key);
        C.updateCellSelectionVisual(key, false);
      } else {
        s.selectedCells.add(key);
        C.updateCellSelectionVisual(key, true);
      }
      return;
    }
  }

  const wallHits = C._raycaster.intersectObjects(Array.from(C.wallMeshes.values()));
  if (wallHits.length > 0) {
    const key = wallHits[0].object.name.replace('wall-', '');
    if (s.walls.has(key)) {
      if (s.selectedWalls.has(key)) {
        s.selectedWalls.delete(key);
        C.updateWallSelectionVisual(key, false);
      } else {
        s.selectedWalls.add(key);
        C.updateWallSelectionVisual(key, true);
      }
      return;
    }
  }

  C.clearSelection();
};

C.deleteAtMouse3D = function(event) {
  C._ndc.x = (event.clientX / window.innerWidth) * 2 - 1;
  C._ndc.y = -(event.clientY / window.innerHeight) * 2 + 1;
  C._raycaster.setFromCamera(C._ndc, C.camera3D);

  const cellHits = C._raycaster.intersectObjects(Array.from(C.cellMeshes.values()));
  if (cellHits.length > 0) {
    const key = cellHits[0].object.name.replace('cell-', '');
    const [gx, gz] = key.split(',').map(Number);
    C.removeCell(gx, gz);
    C.ui.updateStatusBar();
    return true;
  }

  const wallHits = C._raycaster.intersectObjects(Array.from(C.wallMeshes.values()));
  if (wallHits.length > 0) {
    const key = wallHits[0].object.name.replace('wall-', '');
    if (s.walls.has(key)) {
      const [gx, gz, dir] = key.split(',');
      C.removeWall(parseInt(gx), parseInt(gz), dir);
      C.ui.updateStatusBar();
      return true;
    }
  }
  return false;
};

C.deleteSelectedCells = function() {
  for (const key of s.selectedCells) {
    const [gx, gz] = key.split(',').map(Number);
    C.removeCell(gx, gz);
  }
  s.selectedCells.clear();
  for (const key of s.selectedWalls) {
    C.scene.removeWallMeshByKey(key);
    s.walls.delete(key);
  }
  s.selectedWalls.clear();
  C.ui.updateStatusBar();
};

})();

// ===== tools/house.js =====
// ===== CHIRAL HAMMER v0.10.0 — TOOL: HOUSE =====
// Composes fill + walls: drag to fill cells AND place wall perimeter. Atomic on mouseup.
(function() {
const C = window.Chiral;
const s = C.state;

C.tools = C.tools || {};

C.tools.house = {
  onDown: function(event) {
    if (event.button === 0) {
      s._dragStart = C.input.getWorldFromMouse(event);
    } else if (event.button === 2) {
      s._dragStart = C.input.getWorldFromMouse(event);
      const grid = C.input.getGridFromMouse(event);
      if (grid && C.cellExists(grid.gx, grid.gz)) {
        C.removeCell(grid.gx, grid.gz);
        C.ui.updateStatusBar();
      }
    }
  },

  onMove: function(event) {
    if (s.mode === '2d') C.updateHighlight(event);
    else C.edgeHighlight.visible = false;

    if (s.mouseDown && (event.buttons & 1) && s._dragStart) {
      const world = C.input.getWorldFromMouse(event);
      if (world) C.showDragPreview(s._dragStart, world);
    }
    if (s.mouseDown && s.mouseButton === 2 && (event.buttons & 2) && s._dragStart) {
      const world = C.input.getWorldFromMouse(event);
      if (world) C.showDragPreview(s._dragStart, world);
    }
  },

  onUp: function(event) {
    C.hideDragPreview();
    if (s._dragStart && s.mouseButton === 0) {
      const world = C.input.getWorldFromMouse(event);
      if (world) {
        C.fillRect(s._dragStart, world);
        C.wallRect(s._dragStart, world);
      }
    }
    if (s._dragStart && s.mouseButton === 2) {
      const world = C.input.getWorldFromMouse(event);
      if (world) C.eraseRect(s._dragStart, world);
    }
  }
};

// ===== WALL RECT (perimeter walls on a rectangular region) =====

C.wallRect = function(worldA, worldB) {
  const x1 = Math.min(worldA.x, worldB.x);
  const x2 = Math.max(worldA.x, worldB.x);
  const z1 = Math.min(worldA.z, worldB.z);
  const z2 = Math.max(worldA.z, worldB.z);
  const gx1 = Math.floor(x1);
  const gx2 = Math.floor(x2 - 0.001);
  const gz1 = Math.floor(z1);
  const gz2 = Math.floor(z2 - 0.001);

  const newWalls = [];
  for (let gx = gx1; gx <= gx2; gx++) {
    newWalls.push({ gx, gz: gz2 + 1, dir: 'N' });
    newWalls.push({ gx, gz: gz1, dir: 'N' });
  }
  for (let gz = gz1; gz <= gz2; gz++) {
    newWalls.push({ gx: gx1 - 1, gz, dir: 'E' });
    newWalls.push({ gx: gx2, gz, dir: 'E' });
  }

  for (const w of newWalls) {
    C.setWallSilent(w.gx, w.gz, w.dir, s.wallColor, s.wallHeight);
  }
  C.markDirty();
  C.ui.updateStatusBar();
};

})();

// ===== CHIRAL HAMMER v0.10.0 — PERSISTENCE =====
// localStorage auto-save, JSON export/import.
(function() {
const C = window.Chiral;
const s = C.state;

var STORAGE_KEY = 'chiral_hammer:v0.10';

C.persistence = {};

// ===== AUTO-SAVE =====

C.persistence.scheduleSave = function() {
  if (s.saveTimeout) clearTimeout(s.saveTimeout);
  s.saveTimeout = setTimeout(C.persistence.saveState, 500);
};

C.persistence.saveState = function() {
  var data = {
    version: '0.10.0',
    cells: [],
    walls: []
  };
  s.grid.forEach(function(val, key) {
    data.cells.push({ key: key, color: val.color });
  });
  s.walls.forEach(function(val, key) {
    data.walls.push({ key: key, color: val.color, height: val.height });
  });
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    s.dirty = false;
    C.ui.setSaveStatus('SAVED', '#008000');
  } catch(e) {
    C.ui.setSaveStatus('SAVE ERR', '#ff0000');
    console.warn('Failed to save:', e);
  }
};

C.persistence.loadState = function() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.cells && Array.isArray(data.cells)) {
      for (var i = 0; i < data.cells.length; i++) {
        var cell = data.cells[i];
        var parts = cell.key.split(',');
        var gx = Number(parts[0]);
        var gz = Number(parts[1]);
        C.setCellSilent(gx, gz, cell.color);
      }
      C.ui.setSaveStatus('LOADED', '#008000');
    }
    if (data.walls && Array.isArray(data.walls)) {
      for (var j = 0; j < data.walls.length; j++) {
        var wall = data.walls[j];
        var w = C.parseWallKey(wall.key);
        C.setWallSilent(w.gx, w.gz, w.dir, wall.color, wall.height || s.wallHeight);
      }
    }
  } catch(e) {
    console.warn('Failed to load:', e);
  }
};

// ===== EXPORT =====

C.persistence.exportJSON = function() {
  var data = {
    version: '0.10.0',
    cells: [],
    walls: []
  };
  s.grid.forEach(function(val, key) {
    data.cells.push({ key: key, color: val.color });
  });
  s.walls.forEach(function(val, key) {
    data.walls.push({ key: key, color: val.color, height: val.height });
  });
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'chiral_hammer-map.json';
  a.click();
  URL.revokeObjectURL(url);
};

C.persistence.importJSON = function(file) {
  var reader = new FileReader();
  reader.onload = function() {
    try {
      var data = JSON.parse(reader.result);
      if (!data.cells || !Array.isArray(data.cells)) {
        alert('Invalid map file: missing cells array.');
        return;
      }
      C.clearAllCells();
      for (var i = 0; i < data.cells.length; i++) {
        var cell = data.cells[i];
        var parts = cell.key.split(',');
        var gx = Number(parts[0]);
        var gz = Number(parts[1]);
        C.setCellSilent(gx, gz, cell.color);
      }
      if (data.walls && Array.isArray(data.walls)) {
        for (var j = 0; j < data.walls.length; j++) {
          var wall = data.walls[j];
          var w = C.parseWallKey(wall.key);
          C.setWallSilent(w.gx, w.gz, w.dir, wall.color, wall.height || s.wallHeight);
        }
      }
      s.dirty = false;
      C.persistence.saveState();
      C.ui.updateStatusBar();
    } catch(e) {
      alert('Failed to parse map file: ' + e.message);
    }
  };
  reader.readAsText(file);
};

})();

// ===== main.js =====
// ===== CHIRAL HAMMER v0.10.0 — MAIN =====
// Init order, event binding, animate loop, console API.
(function() {
const C = window.Chiral;
const s = C.state;

// ===== EVENT HANDLERS =====

function onMouseDown(event) {
  if (event.target !== C.renderer.domElement) return;

  s.mouseDown = true;
  s.mouseButton = event.button;

  if (s.mode === '2d') {
    if (event.button === 0 && s.keys['Space']) {
      // Space+LMB pan — handled in onMouseMove
      return;
    }
    if (event.button === 1) {
      s.middleDown = true;
      event.preventDefault();
      return;
    }
  }

  if (s.mode === '3d') {
    if (event.button === 1) {
      s.rightDown = true;
      s.mouse.x = 0;
      s.mouse.y = 0;
      return;
    }
  }

  var tool = C.effectiveTool();
  var toolObj = C.tools[tool];
  if (toolObj && toolObj.onDown) {
    toolObj.onDown(event);
  }
}

function onMouseMove(event) {
  s.mouse.x = event.movementX || 0;
  s.mouse.y = event.movementY || 0;

  if (s.mode === '2d') {
    // Pan via middle mouse or space+LMB
    if (s.middleDown || (s.keys['Space'] && s.mouseDown)) {
      C.pan2D(event.movementX, event.movementY);
      return;
    }
  }

  var tool = C.effectiveTool();
  var toolObj = C.tools[tool];
  if (toolObj && toolObj.onMove) {
    toolObj.onMove(event);
  }
}

function onMouseUp(event) {
  var tool = C.effectiveTool();
  var toolObj = C.tools[tool];
  if (toolObj && toolObj.onUp) {
    toolObj.onUp(event);
  }

  s._dragStart = null;
  s.mouseDown = false;
  s.mouseButton = -1;
  s.middleDown = false;
  s.rightDown = false;

  if (s.dirty) {
    C.persistence.scheduleSave();
  }
}

function onWheel(event) {
  if (s.mode === '2d') {
    C.zoom2D(event.deltaY, event.clientX, event.clientY);
  } else if (s.mode === '3d') {
    C.zoom3D(event.deltaY, event.clientX, event.clientY);
  }
}

function onContextMenu(event) {
  event.preventDefault();
}

function onResize() {
  C.renderer.setSize(window.innerWidth, window.innerHeight);
  if (s.mode === '2d') {
    C.update2DCameraAspect();
  } else {
    C.camera3D.aspect = window.innerWidth / window.innerHeight;
    C.camera3D.updateProjectionMatrix();
  }
}

// ===== MAIN LOOP =====

function animate() {
  requestAnimationFrame(animate);

  var delta = C.clock.getDelta();
  var dt = Math.min(delta, 0.1);

  C.update3DCamera(dt);
  C.render();

  if (s.mode === '3d') {
    var sb = document.getElementById('sb-cursor');
    if (sb) sb.textContent =
      s.camPos.x.toFixed(1) + ', ' + s.camPos.y.toFixed(1) + ', ' + s.camPos.z.toFixed(1);
  }
}

// ===== INIT =====

function init() {
  // Load settings before building scene
  C.ui.loadSettings();
  C.applyAllSettings();

  // Set up renderer in DOM
  var container = document.getElementById('canvas-container');
  if (container) container.appendChild(C.renderer.domElement);

  // Event listeners
  C.renderer.domElement.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
  window.addEventListener('wheel', onWheel, { passive: false });
  window.addEventListener('contextmenu', onContextMenu);
  window.addEventListener('keydown', C.input.onKeyDown);
  window.addEventListener('keyup', C.input.onKeyUp);
  window.addEventListener('resize', onResize);

  // Export/Import/Clear buttons
  var btnExport = document.getElementById('btn-export');
  if (btnExport) btnExport.addEventListener('click', C.persistence.exportJSON);
  var btnImport = document.getElementById('btn-import-file');
  var importInput = document.getElementById('import-input');
  if (btnImport && importInput) btnImport.addEventListener('click', function() { importInput.click(); });
  var btnClear = document.getElementById('btn-clear');
  if (btnClear) btnClear.addEventListener('click', function() {
    if (s.grid.size === 0 || confirm('Clear all cells?')) {
      C.clearAllCells();
      C.ui.updateStatusBar();
    }
  });

  // Texture panel max/min
  var btnTpMax = document.getElementById('btn-tp-max');
  var tp = document.getElementById('texture-panel');
  if (btnTpMax) btnTpMax.addEventListener('click', function() {
    s.tpMaximized = !s.tpMaximized;
    if (tp) { if (s.tpMaximized) tp.classList.add('maximized'); else tp.classList.remove('maximized'); }
  });
  var btnTpMin = document.getElementById('btn-tp-min');
  if (btnTpMin) btnTpMin.addEventListener('click', function() {
    s.tpOpen = false;
    if (tp) { tp.classList.remove('open', 'maximized'); }
    s.tpMaximized = false;
  });

  // Treasure box max/min
  var btnTbMax = document.getElementById('btn-tb-max');
  var tb = document.getElementById('treasure-box');
  if (btnTbMax) btnTbMax.addEventListener('click', function() {
    s.tbMaximized = !s.tbMaximized;
    if (tb) { if (s.tbMaximized) tb.classList.add('maximized'); else tb.classList.remove('maximized'); }
  });
  var btnTbMin = document.getElementById('btn-tb-min');
  if (btnTbMin) btnTbMin.addEventListener('click', function() {
    s.tbOpen = false;
    if (tb) { tb.classList.remove('open', 'maximized'); }
    s.tbMaximized = false;
  });

  // File import
  if (importInput) importInput.addEventListener('change', function(e) {
    if (e.target.files[0]) {
      C.persistence.importJSON(e.target.files[0]);
      e.target.value = '';
    }
  });

  // Tool palette buttons
  var toolBtns = document.querySelectorAll('#tool-palette .tpl-btn');
  toolBtns.forEach(function(btn) {
    btn.addEventListener('click', function() { C.setActiveTool(btn.dataset.tool); });
  });

  // Help minimize
  var btnHelpMin = document.getElementById('btn-help-min');
  if (btnHelpMin) btnHelpMin.addEventListener('click', C.ui.toggleHelp);

  // Build UI
  C.ui.buildPalette();
  C.ui.buildControlPanel();
  C.ui.updateHelp();
  C.ui.updateStatusBar();

  // Load saved map
  C.persistence.loadState();
  C.ui.updateStatusBar();

  // Focus renderer for keyboard input
  C.renderer.domElement.focus();

  // Start loop
  animate();
}

// ===== CONSOLE API =====

window.CHIRAL_HAMMER = {
  get state() { return s; },
  get scene() { return C.scene3D; },
  get renderer() { return C.renderer; },
  get cellMeshes() { return C.cellMeshes; },
  get cellGroup() { return C.cellGroup; },
  get wallMeshes() { return C.wallMeshes; },
  get wallGroup() { return C.wallGroup; },
  get wall2DMeshes() { return C.wall2DMeshes; },
  get wall2DGroup() { return C.wall2DGroup; },
  get camera() { return C.activeCamera; },
  setCell: C.setCell,
  removeCell: C.removeCell,
  clearAllCells: C.clearAllCells,
  clearSelection: C.clearSelection,
  commitSelection3D: C.commitSelection3D,
  toggleTexturePanel: C.ui.toggleTexturePanel,
  toggleTreasureBox: C.ui.toggleTreasureBox,
  toggleWireframe: C.toggleWireframe,
  toggleFog: C.ui.toggleFog,
  deleteSelectedCells: C.deleteSelectedCells,
  setWall: C.setWall,
  removeWall: C.removeWall,
  toggleWall: C.toggleWall,
  wallRect: C.wallRect,
  computeOrthogonalWalls: C.computeOrthogonalWalls,
  computePenWalls: C.computePenWalls,
  toggleSelectAtMouse2D: C.toggleSelectAtMouse2D,
  toggleSelectAtMouse3D: C.toggleSelectAtMouse3D,
  deleteAtMouse3D: C.deleteAtMouse3D,
  saveState: C.persistence.saveState,
  loadState: C.persistence.loadState,
  exportJSON: C.persistence.exportJSON,
  importJSON: C.persistence.importJSON,
  setMode: C.setMode,
  setActiveTool: C.setActiveTool,
  effectiveTool: C.effectiveTool,
  undo: C.undo,
  redo: C.redo,
};

// Go
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();

</script>

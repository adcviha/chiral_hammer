<script type="module">
import * as THREE from 'three';

// ===== STATE =====

const state = {
  mode: '2d',              // '2d' | '3d'
  grid: new Map(),          // "x,z" -> { color: '#rrggbb' }
  palette: [
    '#8b7355', '#6b8b6b', '#7b7b7b', '#8b6b4a',
    '#5a7a5a', '#9b8b7b', '#687868', '#a08060',
    '#4a6a5a', '#7b6b5b', '#8b8b7b', '#6b5b4b'
  ],
  activeColor: '#8b7355',
  tbOpen: false,
  tpOpen: false,
  tpMaximized: false,
  tbMaximized: false,
  camera2D: null,
  camera3D: null,

  // 3D camera state
  camPos: new THREE.Vector3(10, 10, 10),
  camYaw: -Math.PI / 4,
  camPitch: -0.5,
  targetYaw: -Math.PI / 4,
  targetPitch: -0.5,

  // Mouse / input state
  mouse: new THREE.Vector2(),
  mouseWorld2D: new THREE.Vector3(),
  mouseDown: false,
  mouseButton: -1,
  middleDown: false,
  rightDown: false,
  keys: {},

  // selection
  selecting: false,
  selectStart: new THREE.Vector2(),
  selectEnd: new THREE.Vector2(),
  selectScreenStart: new THREE.Vector2(),  // screen coords for 3D selection
  selectScreenEnd: new THREE.Vector2(),
  selectedCells: new Set(),   // Set of "x,z" keys

  // walls
  walls: new Map(),            // "gx,gz,N|E" -> { color, height }
  selectedWalls: new Set(),    // Set of canonical wall keys
  wallHeight: 1.0,
  wallColor: '#8b7355',

  // display
  wireframe: false,
  fillMode: false,

  // save flag
  dirty: false,
  saveTimeout: null,
};

// ===== DOM REFS =====

const container = document.getElementById('canvas-container');
const helpMode = document.getElementById('help-mode');
const helpKeys = document.getElementById('help-keys');
const paletteEl = document.getElementById('palette');
const treasureBox = document.getElementById('treasure-box');
const texturePanel = document.getElementById('texture-panel');
const sbMode = document.getElementById('sb-mode');
const sbCells = document.getElementById('sb-cells');
const sbCursor = document.getElementById('sb-cursor');
const sbSave = document.getElementById('sb-save');
const importInput = document.getElementById('import-input');
const selBox = document.getElementById('sel-box');

// ===== THREE.JS SETUP =====

const scene = new THREE.Scene();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x4a6a7a);
scene.fog = new THREE.Fog(0x4a6a7a, 30, 80);
container.appendChild(renderer.domElement);

// 2D orthographic camera
const frustumSize = 20;
const aspect = window.innerWidth / window.innerHeight;
state.camera2D = new THREE.OrthographicCamera(
  frustumSize * aspect / -2,
  frustumSize * aspect / 2,
  frustumSize / 2,
  frustumSize / -2,
  -50, 50
);
state.camera2D.position.set(0, 20, 0);
state.camera2D.lookAt(0, 0, 0);

// 3D perspective camera
state.camera3D = new THREE.PerspectiveCamera(60, aspect, 0.1, 200);
state.camera3D.position.copy(state.camPos);
state.camera3D.lookAt(0, 0, 0);

let activeCamera = state.camera2D;

// Lights for 3D
const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(10, 20, 5);
scene.add(dirLight);

// Grid lines
const gridSize = 50;
const gridHelper = new THREE.GridHelper(gridSize, gridSize, 0x404040, 0x202020);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

// Group for cell meshes
const cellGroup = new THREE.Group();
cellGroup.name = 'cells';
scene.add(cellGroup);

// Group for wall meshes
const wallGroup = new THREE.Group();
wallGroup.name = 'walls';
scene.add(wallGroup);

// Shared wall geometry (1x1, scaled per-wall)
const _wallGeo = new THREE.PlaneGeometry(1, 1);

// Wall mesh cache: canonical key -> THREE.Mesh
const wallMeshes = new Map();

// Highlight quad under cursor in 2D mode
const highlightGeo = new THREE.PlaneGeometry(1, 1);
const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthTest: false });
const highlightQuad = new THREE.Mesh(highlightGeo, highlightMat);
highlightQuad.rotation.x = -Math.PI / 2;
highlightQuad.position.y = 0.01;
highlightQuad.visible = true;
highlightQuad.renderOrder = 999;
highlightQuad.material.depthTest = false;
scene.add(highlightQuad);

// Edge highlight for wall placement (Alt held in 2D)
const edgeHighlightGeo = new THREE.PlaneGeometry(1, 0.08);
const edgeHighlightMat = new THREE.MeshBasicMaterial({
  color: 0xff8800, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthTest: false
});
const edgeHighlight = new THREE.Mesh(edgeHighlightGeo, edgeHighlightMat);
edgeHighlight.position.y = 0.015;
edgeHighlight.visible = false;
edgeHighlight.renderOrder = 998;
edgeHighlight.material.depthTest = false;
scene.add(edgeHighlight);

// Selection rubber-band rectangle (2D mode, Shift+drag)
const selRectGeo = new THREE.PlaneGeometry(1, 1);
const selRectMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthTest: false });
const selRect = new THREE.Mesh(selRectGeo, selRectMat);
selRect.rotation.x = -Math.PI / 2;
selRect.position.y = 0.02;
selRect.visible = false;
selRect.renderOrder = 998;
scene.add(selRect);
// Outline frame for rubber-band
const selOutlineGeo = new THREE.EdgesGeometry(selRectGeo);
const selOutlineMat = new THREE.LineBasicMaterial({ color: 0x008888, depthTest: false });
const selOutline = new THREE.LineSegments(selOutlineGeo, selOutlineMat);
selOutline.rotation.x = -Math.PI / 2;
selOutline.position.y = 0.021;
selOutline.visible = false;
selOutline.renderOrder = 997;
scene.add(selOutline);

// ===== SCRATCH OBJECTS (reused to avoid GC) =====

const _raycaster = new THREE.Raycaster();
const _m4 = new THREE.Matrix4();
const _ndc = new THREE.Vector3();
const _hit = new THREE.Vector3();
const _plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const _intersection = new THREE.Vector3();
const _v3 = new THREE.Vector3();

// ===== CELL MESH CACHE =====
// Map "x,z" -> THREE.Mesh

const cellMeshes = new Map();

// ===== GRID DATA MODEL =====

function gridKey(gx, gz) {
  return `${gx},${gz}`;
}

function cellExists(gx, gz) {
  return state.grid.has(gridKey(gx, gz));
}

function getCell(gx, gz) {
  return state.grid.get(gridKey(gx, gz));
}

function setCell(gx, gz, color) {
  const key = gridKey(gx, gz);
  state.grid.set(key, { color });
  addCellMesh(gx, gz, color);
  markDirty();
}

function removeCell(gx, gz) {
  const key = gridKey(gx, gz);
  state.grid.delete(key);
  removeCellMesh(gx, gz);
  cleanOrphanWallsAround(gx, gz);
  markDirty();
}

function clearAllCells() {
  for (const key of state.grid.keys()) {
    const [gx, gz] = key.split(',').map(Number);
    removeCellMesh(gx, gz);
  }
  state.grid.clear();
  for (const key of state.walls.keys()) {
    removeWallMeshByKey(key);
  }
  state.walls.clear();
  markDirty();
  saveState();
  updateStatusBar();
}

// ===== WALL DATA MODEL =====

function wallKey(gx, gz, dir) {
  return `${gx},${gz},${dir}`;
}

function parseWallKey(key) {
  const parts = key.split(',');
  return { gx: Number(parts[0]), gz: Number(parts[1]), dir: parts[2] };
}

function canonicalWallKey(gx, gz, dir) {
  if (dir === 'S') return wallKey(gx, gz + 1, 'N');
  if (dir === 'W') return wallKey(gx - 1, gz, 'E');
  return wallKey(gx, gz, dir);
}

function edgeHasAdjacentCell(gx, gz, dir) {
  if (dir === 'N') return cellExists(gx, gz) || cellExists(gx, gz - 1);
  if (dir === 'E') return cellExists(gx, gz) || cellExists(gx + 1, gz);
  return false;
}

function getNearestEdge(event) {
  const grid = getGridFromMouse(event);
  if (!grid) return null;
  const { gx, gz, worldX, worldZ } = grid;
  const fx = worldX - gx;
  const fz = worldZ - gz;
  const distN = fz;
  const distS = 1 - fz;
  const distW = fx;
  const distE = 1 - fx;
  const threshold = 0.15;
  const minDist = Math.min(distN, distS, distW, distE);
  if (minDist > threshold) return null;
  let cgx, cgz, cdir;
  if (minDist === distN)      { cgx = gx;     cgz = gz;     cdir = 'N'; }
  else if (minDist === distS) { cgx = gx;     cgz = gz + 1; cdir = 'N'; }
  else if (minDist === distW) { cgx = gx - 1; cgz = gz;     cdir = 'E'; }
  else                        { cgx = gx;     cgz = gz;     cdir = 'E'; }
  return { gx: cgx, gz: cgz, dir: cdir, key: wallKey(cgx, cgz, cdir) };
}

function updateEdgeHighlight(event) {
  const edge = getNearestEdge(event);
  if (!edge || !edgeHasAdjacentCell(edge.gx, edge.gz, edge.dir)) {
    edgeHighlight.visible = false;
    return;
  }
  const { gx, gz, dir } = edge;
  if (dir === 'N') {
    edgeHighlight.position.set(gx + 0.5, 0.015, gz);
    edgeHighlight.rotation.set(-Math.PI / 2, 0, 0);
  } else {
    edgeHighlight.position.set(gx + 1, 0.015, gz + 0.5);
    edgeHighlight.rotation.set(-Math.PI / 2, -Math.PI / 2, 0);
  }
  edgeHighlight.visible = true;
}

function addWallMesh(gx, gz, dir, color, height) {
  const key = wallKey(gx, gz, dir);
  if (wallMeshes.has(key)) {
    wallGroup.remove(wallMeshes.get(key));
    wallMeshes.get(key).material.dispose();
  }
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.85, side: THREE.DoubleSide });
  if (state.wireframe) mat.wireframe = true;
  const mesh = new THREE.Mesh(_wallGeo, mat);
  if (dir === 'N') {
    mesh.position.set(gx + 0.5, height / 2, gz);
    mesh.scale.set(1, height, 1);
  } else {
    mesh.position.set(gx + 1, height / 2, gz + 0.5);
    mesh.rotation.y = -Math.PI / 2;
    mesh.scale.set(1, height, 1);
  }
  mesh.name = `wall-${key}`;
  wallGroup.add(mesh);
  wallMeshes.set(key, mesh);
}

function removeWallMeshByKey(key) {
  const mesh = wallMeshes.get(key);
  if (mesh) {
    wallGroup.remove(mesh);
    mesh.material.dispose();
    wallMeshes.delete(key);
  }
}

function setWall(gx, gz, dir, color, height) {
  const key = canonicalWallKey(gx, gz, dir);
  const parsed = parseWallKey(key);
  state.walls.set(key, { color, height });
  addWallMesh(parsed.gx, parsed.gz, parsed.dir, color, height);
  markDirty();
}

function removeWall(gx, gz, dir) {
  const key = canonicalWallKey(gx, gz, dir);
  state.walls.delete(key);
  removeWallMeshByKey(key);
  markDirty();
}

function toggleWall(gx, gz, dir) {
  const key = canonicalWallKey(gx, gz, dir);
  if (state.walls.has(key)) {
    removeWall(gx, gz, dir);
  } else {
    const parsed = parseWallKey(key);
    if (edgeHasAdjacentCell(parsed.gx, parsed.gz, parsed.dir)) {
      setWall(gx, gz, dir, state.wallColor, state.wallHeight);
    }
  }
}

function cleanOrphanWallsAround(gx, gz) {
  const edges = [
    { cgx: gx,     cgz: gz,     cdir: 'N' },
    { cgx: gx,     cgz: gz + 1, cdir: 'N' },
    { cgx: gx,     cgz: gz,     cdir: 'E' },
    { cgx: gx - 1, cgz: gz,     cdir: 'E' },
  ];
  for (const { cgx, cgz, cdir } of edges) {
    const key = wallKey(cgx, cgz, cdir);
    if (state.walls.has(key) && !edgeHasAdjacentCell(cgx, cgz, cdir)) {
      removeWallMeshByKey(key);
      state.walls.delete(key);
    }
  }
}

function updateWallSelectionVisual(key, selected) {
  const mesh = wallMeshes.get(key);
  if (!mesh) return;
  if (selected) {
    mesh.material.emissive = new THREE.Color(0x444400);
    mesh.material.emissiveIntensity = 0.6;
  } else {
    mesh.material.emissive = new THREE.Color(0x000000);
    mesh.material.emissiveIntensity = 0;
  }
}

// ===== CELL MESHES =====

// Shared geometry — all cells are identical 1x1 flat planes
const _cellGeo = new THREE.PlaneGeometry(1, 1);
_cellGeo.rotateX(-Math.PI / 2);

function addCellMesh(gx, gz, color) {
  const key = gridKey(gx, gz);
  if (cellMeshes.has(key)) {
    removeCellMesh(gx, gz);
  }

  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.85, side: THREE.DoubleSide });
  if (state.wireframe) mat.wireframe = true;
  const mesh = new THREE.Mesh(_cellGeo, mat);
  mesh.position.set(gx + 0.5, 0.002, gz + 0.5);
  mesh.name = `cell-${key}`;

  cellGroup.add(mesh);
  cellMeshes.set(key, mesh);
}

function removeCellMesh(gx, gz) {
  const key = gridKey(gx, gz);
  const mesh = cellMeshes.get(key);
  if (mesh) {
    cellGroup.remove(mesh);
    mesh.material.dispose();
    cellMeshes.delete(key);
  }
}

function updateCellColor(gx, gz, color) {
  const key = gridKey(gx, gz);
  const mesh = cellMeshes.get(key);
  if (mesh) {
    mesh.material.color.set(color);
  }
}

// ===== 2D INPUT =====

function getWorldFromMouse(event) {
  _ndc.x = (event.clientX / window.innerWidth) * 2 - 1;
  _ndc.y = -(event.clientY / window.innerHeight) * 2 + 1;
  _raycaster.setFromCamera(_ndc, activeCamera);
  const target = new THREE.Vector3();
  const denom = _raycaster.ray.direction.y;
  if (Math.abs(denom) < 0.0001) return null;
  const t = -_raycaster.ray.origin.y / denom;
  if (t < 0) return null;
  target.copy(_raycaster.ray.origin).addScaledVector(_raycaster.ray.direction, t);
  return target;
}

function getGridFromMouse(event) {
  _ndc.x = (event.clientX / window.innerWidth) * 2 - 1;
  _ndc.y = -(event.clientY / window.innerHeight) * 2 + 1;

  _raycaster.setFromCamera(_ndc, activeCamera);

  const target = new THREE.Vector3();
  const rayOrigin = _raycaster.ray.origin;
  const rayDir = _raycaster.ray.direction;

  const denom = rayDir.y;
  if (Math.abs(denom) < 0.0001) return null;
  const t = -rayOrigin.y / denom;
  if (t < 0) return null;

  target.copy(rayOrigin).addScaledVector(rayDir, t);

  const gx = Math.floor(target.x);
  const gz = Math.floor(target.z);
  return { gx, gz, worldX: target.x, worldZ: target.z };
}

function paintAtMouse(event) {
  const grid = getGridFromMouse(event);
  if (!grid) return;
  if (state.mode !== '2d') return;

  if (event.buttons & 1) {
    if (!cellExists(grid.gx, grid.gz)) {
      setCell(grid.gx, grid.gz, state.activeColor);
      updateStatusBar();
    }
  } else if (event.buttons & 2) {
    if (cellExists(grid.gx, grid.gz)) {
      removeCell(grid.gx, grid.gz);
      updateStatusBar();
    }
  }
}

function updateHighlight(event) {
  if (state.mode !== '2d') {
    highlightQuad.visible = false;
    edgeHighlight.visible = false;
    return;
  }
  if (state.keys['AltLeft'] || state.keys['AltRight']) {
    highlightQuad.visible = false;
    updateEdgeHighlight(event);
    return;
  }
  edgeHighlight.visible = false;
  const grid = getGridFromMouse(event);
  if (!grid) {
    highlightQuad.visible = false;
    return;
  }
  highlightQuad.position.set(grid.gx + 0.5, 0.01, grid.gz + 0.5);
  highlightQuad.visible = true;

  sbCursor.textContent = `${grid.gx}, ${grid.gz}`;
  state.mouseWorld2D.set(grid.worldX, 0, grid.worldZ);
}

function fillRect(worldA, worldB) {
  const x1 = Math.min(worldA.x, worldB.x);
  const x2 = Math.max(worldA.x, worldB.x);
  const z1 = Math.min(worldA.z, worldB.z);
  const z2 = Math.max(worldA.z, worldB.z);
  const gx1 = Math.floor(x1);
  const gx2 = Math.floor(x2 - 0.001);
  const gz1 = Math.floor(z1);
  const gz2 = Math.floor(z2 - 0.001);
  for (let gx = gx1; gx <= gx2; gx++) {
    for (let gz = gz1; gz <= gz2; gz++) {
      if (!cellExists(gx, gz)) {
        setCell(gx, gz, state.activeColor);
      }
    }
  }
  updateStatusBar();
}

function eraseRect(worldA, worldB) {
  const x1 = Math.min(worldA.x, worldB.x);
  const x2 = Math.max(worldA.x, worldB.x);
  const z1 = Math.min(worldA.z, worldB.z);
  const z2 = Math.max(worldA.z, worldB.z);
  const gx1 = Math.floor(x1);
  const gx2 = Math.floor(x2 - 0.001);
  const gz1 = Math.floor(z1);
  const gz2 = Math.floor(z2 - 0.001);
  for (let gx = gx1; gx <= gx2; gx++) {
    for (let gz = gz1; gz <= gz2; gz++) {
      if (cellExists(gx, gz)) {
        removeCell(gx, gz);
      }
    }
  }
  updateStatusBar();
}

// ===== SELECTION =====

function updateSelRect() {
  const x1 = Math.min(state.selectStart.x, state.selectEnd.x);
  const x2 = Math.max(state.selectStart.x, state.selectEnd.x);
  const z1 = Math.min(state.selectStart.y, state.selectEnd.y);
  const z2 = Math.max(state.selectStart.y, state.selectEnd.y);

  const w = Math.max(x2 - x1, 0.1);
  const h = Math.max(z2 - z1, 0.1);
  selRect.scale.set(w, h, 1);
  selRect.position.set((x1 + x2) / 2, 0.02, (z1 + z2) / 2);
  selOutline.scale.set(w, h, 1);
  selOutline.position.set((x1 + x2) / 2, 0.021, (z1 + z2) / 2);
}

function commitSelection() {
  const x1 = Math.min(state.selectStart.x, state.selectEnd.x);
  const x2 = Math.max(state.selectStart.x, state.selectEnd.x);
  const z1 = Math.min(state.selectStart.y, state.selectEnd.y);
  const z2 = Math.max(state.selectStart.y, state.selectEnd.y);

  // Deselect previous
  for (const key of state.selectedCells) {
    updateCellSelectionVisual(key, false);
  }
  state.selectedCells.clear();

  // Select cells whose center falls within the world rectangle
  const gx1 = Math.floor(x1);
  const gx2 = Math.floor(x2 - 0.001);
  const gz1 = Math.floor(z1);
  const gz2 = Math.floor(z2 - 0.001);
  for (let gx = gx1; gx <= gx2; gx++) {
    for (let gz = gz1; gz <= gz2; gz++) {
      const key = gridKey(gx, gz);
      if (state.grid.has(key)) {
        state.selectedCells.add(key);
        updateCellSelectionVisual(key, true);
      }
    }
  }

  // Select walls whose midpoint falls within the rectangle
  for (const [key, wall] of state.walls) {
    const { gx, gz, dir } = parseWallKey(key);
    const mx = dir === 'N' ? gx + 0.5 : gx + 1;
    const mz = dir === 'N' ? gz : gz + 0.5;
    if (mx >= x1 && mx <= x2 && mz >= z1 && mz <= z2) {
      state.selectedWalls.add(key);
      updateWallSelectionVisual(key, true);
    }
  }
}

function commitSelection3D() {
  const x1 = Math.min(state.selectScreenStart.x, state.selectScreenEnd.x);
  const y1 = Math.min(state.selectScreenStart.y, state.selectScreenEnd.y);
  const x2 = Math.max(state.selectScreenStart.x, state.selectScreenEnd.x);
  const y2 = Math.max(state.selectScreenStart.y, state.selectScreenEnd.y);

  if (x2 - x1 < 3 && y2 - y1 < 3) return;

  // Deselect previous
  for (const key of state.selectedCells) {
    updateCellSelectionVisual(key, false);
  }
  state.selectedCells.clear();

  const halfW = window.innerWidth / 2;
  const halfH = window.innerHeight / 2;

  for (const [key, mesh] of cellMeshes) {
    const wp = mesh.position.clone().project(state.camera3D);
    if (wp.z > 1) continue; // behind camera

    const sx = (wp.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-wp.y * 0.5 + 0.5) * window.innerHeight;

    if (sx >= x1 && sx <= x2 && sy >= y1 && sy <= y2) {
      state.selectedCells.add(key);
      updateCellSelectionVisual(key, true);
    }
  }

  for (const [key, mesh] of wallMeshes) {
    const wp = mesh.position.clone().project(state.camera3D);
    if (wp.z > 1) continue;
    const sx = (wp.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-wp.y * 0.5 + 0.5) * window.innerHeight;
    if (sx >= x1 && sx <= x2 && sy >= y1 && sy <= y2) {
      state.selectedWalls.add(key);
      updateWallSelectionVisual(key, true);
    }
  }
}

function clearSelection() {
  for (const key of state.selectedCells) {
    updateCellSelectionVisual(key, false);
  }
  state.selectedCells.clear();
  for (const key of state.selectedWalls) {
    updateWallSelectionVisual(key, false);
  }
  state.selectedWalls.clear();
}

function deleteSelectedCells() {
  for (const key of state.selectedCells) {
    const [gx, gz] = key.split(',').map(Number);
    removeCell(gx, gz);
  }
  state.selectedCells.clear();
  for (const key of state.selectedWalls) {
    removeWallMeshByKey(key);
    state.walls.delete(key);
  }
  state.selectedWalls.clear();
  updateStatusBar();
}

function updateCellSelectionVisual(key, selected) {
  const mesh = cellMeshes.get(key);
  if (!mesh) return;
  if (selected) {
    mesh.material.emissive = new THREE.Color(0x444400);
    mesh.material.emissiveIntensity = 0.6;
  } else {
    mesh.material.emissive = new THREE.Color(0x000000);
    mesh.material.emissiveIntensity = 0;
  }
}

// ===== 3D INPUT =====

function update3DCamera(deltaSec) {
  if (state.mode !== '3d') return;

  const speed = state.keys['ShiftLeft'] || state.keys['ShiftRight'] ? 15 : 5;
  const moveSpeed = speed * deltaSec;
  const lookSensitivity = 0.25;

  // Accumulate mouse delta into target yaw/pitch while right mouse is held
  if (state.rightDown) {
    state.targetYaw -= state.mouse.x * lookSensitivity * deltaSec;
    state.targetPitch -= state.mouse.y * lookSensitivity * deltaSec;
    state.targetPitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, state.targetPitch));
    state.mouse.set(0, 0);
  }

  // Smooth lerp camera toward target
  const lerpRate = 5;
  const t = 1 - Math.exp(-lerpRate * deltaSec);
  state.camYaw += (state.targetYaw - state.camYaw) * t;
  state.camPitch += (state.targetPitch - state.camPitch) * t;

  const forward = new THREE.Vector3(
    Math.sin(state.camYaw) * Math.cos(state.camPitch),
    Math.sin(state.camPitch),
    Math.cos(state.camYaw) * Math.cos(state.camPitch)
  ).normalize();

  const right = new THREE.Vector3(
    Math.sin(state.camYaw + Math.PI / 2),
    0,
    Math.cos(state.camYaw + Math.PI / 2)
  ).normalize();

  if (state.keys['KeyW']) state.camPos.addScaledVector(forward, moveSpeed);
  if (state.keys['KeyS']) state.camPos.addScaledVector(forward, -moveSpeed);
  if (state.keys['KeyA']) state.camPos.addScaledVector(right, moveSpeed);
  if (state.keys['KeyD']) state.camPos.addScaledVector(right, -moveSpeed);
  if (state.keys['KeyQ']) state.camPos.y -= moveSpeed;
  if (state.keys['KeyE']) state.camPos.y += moveSpeed;

  // Arrow keys = look (twin-stick)
  const arrowLook = 2 * deltaSec;
  if (state.keys['ArrowLeft'])  state.targetYaw += arrowLook;
  if (state.keys['ArrowRight']) state.targetYaw -= arrowLook;
  if (state.keys['ArrowUp'])    state.targetPitch += arrowLook;
  if (state.keys['ArrowDown'])  state.targetPitch -= arrowLook;
  state.targetPitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, state.targetPitch));

  const lookTarget = new THREE.Vector3(
    state.camPos.x + Math.sin(state.camYaw) * Math.cos(state.camPitch),
    state.camPos.y + Math.sin(state.camPitch),
    state.camPos.z + Math.cos(state.camYaw) * Math.cos(state.camPitch)
  );

  state.camera3D.position.copy(state.camPos);
  state.camera3D.lookAt(lookTarget);

  sbCursor.textContent =
    `${state.camPos.x.toFixed(1)}, ${state.camPos.y.toFixed(1)}, ${state.camPos.z.toFixed(1)}`;
}

// ===== MODE SWITCHING =====

function getCellBounds() {
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  if (cellMeshes.size === 0) return null;
  for (const mesh of cellMeshes.values()) {
    const p = mesh.position;
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.z < minZ) minZ = p.z;
    if (p.z > maxZ) maxZ = p.z;
  }
  return { cx: (minX + maxX) / 2, cz: (minZ + maxZ) / 2, span: Math.max(maxX - minX, maxZ - minZ, 2) };
}

function setMode(mode) {
  state.mode = mode;
  activeCamera = mode === '2d' ? state.camera2D : state.camera3D;

  if (mode === '2d') {
    highlightQuad.visible = true;
    sbCursor.textContent = '—';
  } else {
    highlightQuad.visible = false;

    const bounds = getCellBounds();
    if (bounds) {
      const dist = Math.max(bounds.span * 1.2, 6);
      const h = dist * 0.6;
      state.camPos.set(bounds.cx + dist, h, bounds.cz + dist);
      const dir = new THREE.Vector3(bounds.cx, 0, bounds.cz).sub(state.camPos).normalize();
      state.camYaw = Math.atan2(dir.x, dir.z);
      state.camPitch = Math.asin(Math.max(-1, Math.min(1, dir.y)));
      state.targetYaw = state.camYaw;
      state.targetPitch = state.camPitch;
    }
    state.camera3D.position.copy(state.camPos);
  }

  updateHelp();
  updateStatusBar();

  renderer.setSize(window.innerWidth, window.innerHeight);
  if (mode === '2d') {
    update2DCameraAspect();
  } else {
    state.camera3D.aspect = window.innerWidth / window.innerHeight;
    state.camera3D.updateProjectionMatrix();
  }
}

function update2DCameraAspect() {
  const a = window.innerWidth / window.innerHeight;
  const fs = frustumSize;
  state.camera2D.left = fs * a / -2;
  state.camera2D.right = fs * a / 2;
  state.camera2D.top = fs / 2;
  state.camera2D.bottom = fs / -2;
  state.camera2D.updateProjectionMatrix();
}

// ===== 2D PAN & ZOOM =====

function pan2D(dx, dy) {
  if (state.mode !== '2d') return;
  const s = frustumSize / (state.camera2D.zoom * window.innerHeight);
  state.camera2D.position.x -= dx * s;
  state.camera2D.position.z -= dy * s;
}

function zoom2D(delta, cursorX, cursorY) {
  if (state.mode !== '2d') return;

  const oldZoom = state.camera2D.zoom;
  const newZoom = Math.max(0.25, Math.min(8, oldZoom * (1 - delta * 0.001)));
  state.camera2D.zoom = newZoom;

  const ndcX = (cursorX / window.innerWidth) * 2 - 1;
  const ndcY = -(cursorY / window.innerHeight) * 2 + 1;
  const worldBefore = _v3.set(ndcX / oldZoom, 0, ndcY / oldZoom)
    .add(state.camera2D.position);
  const worldAfter = _v3.set(ndcX / newZoom, 0, ndcY / newZoom)
    .add(state.camera2D.position);
  state.camera2D.position.add(worldBefore.sub(worldAfter));

  state.camera2D.updateProjectionMatrix();
}

// ===== EVENT HANDLERS =====

function onMouseDown(event) {
  if (event.target !== renderer.domElement) return;

  if (state.mode === '2d') {
    // Alt+click toggles wall on nearest edge
    if ((state.keys['AltLeft'] || state.keys['AltRight']) && event.button === 0) {
      const edge = getNearestEdge(event);
      if (edge && edgeHasAdjacentCell(edge.gx, edge.gz, edge.dir)) {
        toggleWall(edge.gx, edge.gz, edge.dir);
        updateStatusBar();
      }
      return;
    }

    if (event.button === 0) {
      state.mouseDown = true;
      state.mouseButton = 0;
      if (state.keys['ShiftLeft'] || state.keys['ShiftRight']) {
        // Shift+LMB = select (world-space rubber-band)
        const world = getWorldFromMouse(event);
        if (world) {
          clearSelection();
          state.selecting = true;
          state.selectStart.set(world.x, world.z);
          state.selectEnd.set(world.x, world.z);
          updateSelRect();
          selRect.visible = true; selOutline.visible = true;
        }
      } else if (state.keys['Space']) {
        // Space+LMB = pan
      } else if (state.fillMode) {
        // Fill mode: drag-fill rectangle
        state._fillStart = getWorldFromMouse(event);
        paintAtMouse(event);
      } else {
        // Single cell paint
        paintAtMouse(event);
      }
    } else if (event.button === 2) {
      // RMB = erase
      state.mouseDown = true;
      state.mouseButton = 2;
      if (state.fillMode) {
        state._fillStart = getWorldFromMouse(event);
      }
      const grid = getGridFromMouse(event);
      if (grid && cellExists(grid.gx, grid.gz)) {
        removeCell(grid.gx, grid.gz);
        updateStatusBar();
      }
    } else if (event.button === 1) {
      // MMB = pan
      state.middleDown = true;
      event.preventDefault();
    }
  }

  if (state.mode === '3d') {
    if (event.button === 0 && (state.keys['ShiftLeft'] || state.keys['ShiftRight'])) {
      state.mouseDown = true;
      state.selecting = true;
      state.selectScreenStart.set(event.clientX, event.clientY);
      state.selectScreenEnd.set(event.clientX, event.clientY);
      selBox.style.display = 'block';
      selBox.style.left = event.clientX + 'px';
      selBox.style.top = event.clientY + 'px';
      selBox.style.width = '0px';
      selBox.style.height = '0px';
    } else if (event.button === 2) {
      state.rightDown = true;
      state.mouse.set(0, 0);
    }
  }
}

function onMouseMove(event) {
  state.mouse.set(
    event.movementX || 0,
    event.movementY || 0
  );

  if (state.mode === '2d') {
    updateHighlight(event);

    if (state.selecting) {
      const world = getWorldFromMouse(event);
      if (world) {
        state.selectEnd.set(world.x, world.z);
        updateSelRect();
      }
      return;
    }

    if (state.middleDown || (state.keys['Space'] && state.mouseDown)) {
      pan2D(event.movementX, event.movementY);
      return;
    }

    if (state.mouseDown && state.mouseButton === 0 && (event.buttons & 1)) {
      if (state._fillStart) {
        const world = getWorldFromMouse(event);
        if (world) {
          fillRect(state._fillStart, world);
        }
      } else {
        paintAtMouse(event);
      }
    }
    if (state.mouseDown && state.mouseButton === 2 && (event.buttons & 2)) {
      if (state._fillStart) {
        const world = getWorldFromMouse(event);
        if (world) {
          eraseRect(state._fillStart, world);
        }
      } else {
        const grid = getGridFromMouse(event);
        if (grid && cellExists(grid.gx, grid.gz)) {
          removeCell(grid.gx, grid.gz);
          updateStatusBar();
        }
      }
    }
  }

  if (state.mode === '3d' && state.selecting) {
    state.selectScreenEnd.set(event.clientX, event.clientY);
    const x1 = Math.min(state.selectScreenStart.x, state.selectScreenEnd.x);
    const y1 = Math.min(state.selectScreenStart.y, state.selectScreenEnd.y);
    const x2 = Math.max(state.selectScreenStart.x, state.selectScreenEnd.x);
    const y2 = Math.max(state.selectScreenStart.y, state.selectScreenEnd.y);
    selBox.style.left = x1 + 'px';
    selBox.style.top = y1 + 'px';
    selBox.style.width = (x2 - x1) + 'px';
    selBox.style.height = (y2 - y1) + 'px';
  }
}

function onMouseUp(event) {
  if (state.selecting) {
    if (state.mode === '3d') {
      commitSelection3D();
      selBox.style.display = 'none';
    } else {
      commitSelection();
      selRect.visible = false; selOutline.visible = false;
    }
    state.selecting = false;
  }

  state._fillStart = null;
  state.mouseDown = false;
  state.mouseButton = -1;
  state.middleDown = false;
  state.rightDown = false;

  if (state.dirty) {
    scheduleSave();
  }
}

function onWheel(event) {
  if (state.mode === '2d') {
    zoom2D(event.deltaY, event.clientX, event.clientY);
  } else if (state.mode === '3d') {
    _ndc.x = (event.clientX / window.innerWidth) * 2 - 1;
    _ndc.y = -(event.clientY / window.innerHeight) * 2 + 1;
    _raycaster.setFromCamera(_ndc, state.camera3D);
    const hit = new THREE.Vector3();
    const didHit = _raycaster.ray.intersectPlane(_plane, hit);
    const dolly = event.deltaY * 0.05;
    if (didHit) {
      const dir = new THREE.Vector3().subVectors(hit, state.camPos).normalize();
      state.camPos.addScaledVector(dir, dolly);
    } else {
      const fwd = new THREE.Vector3(
        Math.sin(state.camYaw) * Math.cos(state.camPitch),
        Math.sin(state.camPitch),
        Math.cos(state.camYaw) * Math.cos(state.camPitch)
      ).normalize();
      state.camPos.addScaledVector(fwd, dolly);
    }
  }
}

function onContextMenu(event) {
  event.preventDefault();
}

function onKeyDown(event) {
  state.keys[event.code] = true;

  if (event.code === 'Tab') {
    event.preventDefault();
    setMode(state.mode === '2d' ? '3d' : '2d');
    return;
  }

  if (event.code === 'KeyT') {
    toggleTexturePanel();
    return;
  }

  if (event.code === 'KeyF') {
    toggleFillMode();
    return;
  }

  if (event.code === 'KeyG') {
    toggleWireframe();
    return;
  }

  if (event.code === 'Backspace' || event.code === 'Delete') {
    event.preventDefault();
    deleteSelectedCells();
    return;
  }

  if (event.code === 'KeyB') {
    toggleTreasureBox();
    return;
  }

  if (event.code === 'Escape') {
    if (state.tpOpen) { toggleTexturePanel(); return; }
    if (state.tbOpen) { toggleTreasureBox(); return; }
  }
}

function onKeyUp(event) {
  state.keys[event.code] = false;
}

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (state.mode === '2d') {
    update2DCameraAspect();
  } else {
    state.camera3D.aspect = window.innerWidth / window.innerHeight;
    state.camera3D.updateProjectionMatrix();
  }
}

// ===== PALETTE =====

function buildPalette() {
  paletteEl.innerHTML = '';
  state.palette.forEach(color => {
    const swatch = document.createElement('div');
    swatch.className = 'swatch' + (color === state.activeColor ? ' active' : '');
    swatch.style.background = color;
    swatch.title = color;
    swatch.addEventListener('click', () => {
      state.activeColor = color;
      buildPalette();
    });
    paletteEl.appendChild(swatch);
  });
}

// ===== TREASURE BOX =====

function toggleTexturePanel() {
  state.tpOpen = !state.tpOpen;
  if (state.tpOpen) {
    texturePanel.classList.add('open');
  } else {
    texturePanel.classList.remove('open');
  }
}

function toggleFillMode() {
  state.fillMode = !state.fillMode;
  updateHelp();
  updateStatusBar();
}

function toggleWireframe() {
  state.wireframe = !state.wireframe;
  for (const mesh of cellMeshes.values()) {
    mesh.material.wireframe = state.wireframe;
  }
  for (const mesh of wallMeshes.values()) {
    mesh.material.wireframe = state.wireframe;
  }
}

function toggleTreasureBox() {
  state.tbOpen = !state.tbOpen;
  if (state.tbOpen) {
    treasureBox.classList.add('open');
  } else {
    treasureBox.classList.remove('open');
  }
}

// ===== STATUS BAR =====

function updateStatusBar() {
  if (state.mode === '2d') {
    sbMode.textContent = state.fillMode ? '2D FILL' : '2D PAINT';
  } else {
    sbMode.textContent = '3D FLY';
  }
  sbCells.textContent = state.grid.size + (state.walls.size ? ` +${state.walls.size}w` : '');
}

// ===== HELP OVERLAY =====

function updateHelp() {
  if (state.mode === '2d') {
    helpMode.textContent = '2D PAINT';
    const fillLabel = state.fillMode ? 'FILL [ON]' : 'FILL [OFF]';
    helpKeys.innerHTML = `
      <span class="key">LMB</span> <span class="dim">${state.fillMode ? 'drag fill rect' : 'paint cell'}</span><br>
      <span class="key">RMB</span> <span class="dim">${state.fillMode ? 'drag erase rect' : 'erase cell'}</span><br>
      <span class="key">Alt+LMB</span> <span class="dim">toggle wall on edge</span><br>
      <span class="key">Shift+LMB</span> <span class="dim">select cells</span><br>
      <span class="key">Space+LMB</span> <span class="dim">pan</span><br>
      <span class="key">MMB drag</span> <span class="dim">pan</span><br>
      <span class="key">Scroll</span> <span class="dim">zoom</span><br>
      <span class="key">F</span> <span class="dim">${fillLabel}</span><br>
      <span class="key">G</span> <span class="dim">wireframe</span><br>
      <span class="key">Del</span> <span class="dim">delete selected</span><br>
      <span class="key">Tab</span> <span class="dim">switch to 3D</span><br>
      <span class="key">T</span> <span class="dim">textures</span> <span class="key">B</span> <span class="dim">treasure</span>
    `;
  } else {
    helpMode.textContent = '3D FLY';
    helpKeys.innerHTML = `
      <span class="key">WASD</span> <span class="dim">move</span><br>
      <span class="key">Q/E</span> <span class="dim">down / up</span><br>
      <span class="key">Shift</span> <span class="dim">speed boost</span><br>
      <span class="key">Arrows</span> <span class="dim">look around</span><br>
      <span class="key">RMB hold</span> <span class="dim">mouse look</span><br>
      <span class="key">Scroll</span> <span class="dim">zoom to cursor</span><br>
      <span class="key">Shift+LMB</span> <span class="dim">select cells</span><br>
      <span class="key">G</span> <span class="dim">wireframe</span><br>
      <span class="key">Del</span> <span class="dim">delete selected</span><br>
      <span class="key">Tab</span> <span class="dim">switch to 2D</span><br>
      <span class="key">T</span> <span class="dim">textures</span> <span class="key">B</span> <span class="dim">treasure</span>
    `;
  }
}

// ===== PERSISTENCE =====

const STORAGE_KEY = 'chiral_hammer:v0.8';

function markDirty() {
  state.dirty = true;
  sbSave.textContent = 'UNSAVED';
  sbSave.style.color = '#ff0000';
}

function scheduleSave() {
  if (state.saveTimeout) clearTimeout(state.saveTimeout);
  state.saveTimeout = setTimeout(saveState, 500);
}

function saveState() {
  const data = {
    version: 0.8,
    cells: Array.from(state.grid.entries()).map(([key, val]) => ({ key, color: val.color })),
    walls: Array.from(state.walls.entries()).map(([key, val]) => ({ key, color: val.color, height: val.height })),
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    state.dirty = false;
    sbSave.textContent = 'SAVED';
    sbSave.style.color = '#008000';
  } catch (e) {
    sbSave.textContent = 'SAVE ERR';
    sbSave.style.color = '#ff0000';
    console.warn('Failed to save:', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.cells && Array.isArray(data.cells)) {
      for (const cell of data.cells) {
        const [gx, gz] = cell.key.split(',').map(Number);
        setCell(gx, gz, cell.color);
      }
      state.dirty = false;
      sbSave.textContent = 'LOADED';
      sbSave.style.color = '#008000';
    }
    if (data.walls && Array.isArray(data.walls)) {
      for (const wall of data.walls) {
        const { gx, gz, dir } = parseWallKey(wall.key);
        setWall(gx, gz, dir, wall.color, wall.height || state.wallHeight);
      }
    }
  } catch (e) {
    console.warn('Failed to load:', e);
  }
}

function exportJSON() {
  const data = {
    version: 0.8,
    cells: Array.from(state.grid.entries()).map(([key, val]) => ({ key, color: val.color })),
    walls: Array.from(state.walls.entries()).map(([key, val]) => ({ key, color: val.color, height: val.height })),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'chiral_hammer-map.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.cells || !Array.isArray(data.cells)) {
        alert('Invalid map file: missing cells array.');
        return;
      }
      clearAllCells();
      for (const cell of data.cells) {
        const [gx, gz] = cell.key.split(',').map(Number);
        setCell(gx, gz, cell.color);
      }
      if (data.walls && Array.isArray(data.walls)) {
        for (const wall of data.walls) {
          const { gx, gz, dir } = parseWallKey(wall.key);
          setWall(gx, gz, dir, wall.color, wall.height || state.wallHeight);
        }
      }
      state.dirty = false;
      saveState();
      updateStatusBar();
    } catch (e) {
      alert('Failed to parse map file: ' + e.message);
    }
  };
  reader.readAsText(file);
}

// ===== MAIN LOOP =====

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const dt = Math.min(delta, 0.1);

  update3DCamera(dt);

  renderer.render(scene, activeCamera);

  if (state.mode === '3d') {
    sbCursor.textContent =
      `${state.camPos.x.toFixed(1)}, ${state.camPos.y.toFixed(1)}, ${state.camPos.z.toFixed(1)}`;
  }
}

// ===== INIT =====

function init() {
  renderer.domElement.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
  window.addEventListener('wheel', onWheel, { passive: false });
  window.addEventListener('contextmenu', onContextMenu);
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('keyup', onKeyUp);
  window.addEventListener('resize', onResize);

  document.getElementById('btn-export').addEventListener('click', exportJSON);
  document.getElementById('btn-import-file').addEventListener('click', () => importInput.click());
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (state.grid.size === 0 || confirm('Clear all cells?')) {
      clearAllCells();
      updateStatusBar();
    }
  });
  document.getElementById('btn-tp-max').addEventListener('click', () => {
    state.tpMaximized = !state.tpMaximized;
    if (state.tpMaximized) {
      texturePanel.classList.add('maximized');
    } else {
      texturePanel.classList.remove('maximized');
    }
  });
  document.getElementById('btn-tp-min').addEventListener('click', () => {
    state.tpOpen = false;
    texturePanel.classList.remove('open', 'maximized');
    state.tpMaximized = false;
  });
  document.getElementById('btn-tb-max').addEventListener('click', () => {
    state.tbMaximized = !state.tbMaximized;
    if (state.tbMaximized) {
      treasureBox.classList.add('maximized');
    } else {
      treasureBox.classList.remove('maximized');
    }
  });
  document.getElementById('btn-tb-min').addEventListener('click', () => {
    state.tbOpen = false;
    treasureBox.classList.remove('open', 'maximized');
    state.tbMaximized = false;
  });
  importInput.addEventListener('change', (e) => {
    if (e.target.files[0]) {
      importJSON(e.target.files[0]);
      e.target.value = '';
    }
  });

  buildPalette();
  updateHelp();
  updateStatusBar();
  loadState();
  updateStatusBar();

  renderer.domElement.focus();

  animate();
}

// ===== EXPOSE FOR CONSOLE HACKING =====

window.CHIRAL_HAMMER = {
  state,
  scene,
  renderer,
  cellMeshes,
  cellGroup,
  setCell,
  removeCell,
  clearAllCells,
  clearSelection,
  commitSelection3D,
  toggleTexturePanel,
  toggleTreasureBox,
  toggleWireframe,
  toggleFillMode,
  deleteSelectedCells,
  wallMeshes,
  wallGroup,
  setWall,
  removeWall,
  toggleWall,
  saveState,
  loadState,
  exportJSON,
  importJSON,
  setMode,
  get camera() { return activeCamera; },
};

init();
</script>
